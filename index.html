<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Ben Music Pro - Player Avançado</title>
<meta name="theme-color" content="#7c3aed">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
:root { --bg: #0f0f14; --card: #1a1a22; --primary: #7c3aed; --primary-dark: #6d28d9; --text: #e5e7eb; --text-muted: #9ca3af; --border: #2d2d3a; --success: #10b981; }
body { background: var(--bg); color: var(--text); min-height: 100vh; display: flex; justify-content: center; padding: 16px; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; }
.app { width: 100%; max-width: 550px; display: flex; flex-direction: column; gap: 20px; }
.player-card { background: var(--card); border: 1px solid var(--border); border-radius: 28px; padding: 24px; box-shadow: 0 8px 32px rgba(0,0,0,0.2); }
.btn-main { width: 100%; background: var(--primary); color: white; border: none; padding: 18px; border-radius: 16px; font-weight: 800; cursor: pointer; margin-top: 10px; transition: all 0.3s; }
.btn-main:active { transform: scale(0.98); }
.playlist { background: var(--card); border: 1px solid var(--border); border-radius: 20px; padding: 8px; max-height: 300px; overflow-y: auto; margin-top: 10px; }
.track { padding: 12px; border-bottom: 1px solid var(--border); font-size: 13px; cursor: pointer; transition: all 0.2s; }
.track:active { background: rgba(124, 58, 237, 0.2); }
.track.active { background: rgba(124, 58, 237, 0.15); border-left: 3px solid var(--primary); }
.permission-box { background: rgba(16, 185, 129, 0.1); border: 1px solid var(--success); border-radius: 16px; padding: 16px; margin-bottom: 10px; text-align: center; }
.btn-permission { background: var(--success); color: white; border: none; padding: 12px 24px; border-radius: 40px; font-weight: bold; margin-top: 10px; cursor: pointer; }
</style>
</head>
<body>

<div id="flameNeonPopup" style="position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 20000; display: flex; align-items: center; justify-content: center; cursor: pointer;">
    <div style="background: #0a0a0c; border-radius: 40px; padding: 2rem; text-align: center; border: 2px solid #ff4600;">
        <div style="font-size: 2rem; font-weight: 900; color: #ff7300;">✦ IGNIS ✦</div>
        <div style="color: #fff; font-weight: 800;">VANDENSON LIMA PINHEIRO</div>
    </div>
</div>

<div class="app">
    <div class="player-card">
        <h2 id="title">Ben Music Pro</h2>
        <p id="status" style="color: var(--text-muted); font-size: 12px;">📱 Verificando permissões...</p>
        <audio id="audio" style="width: 100%; margin-top: 20px;" controls></audio>
    </div>

    <div id="permissionArea">
        <div class="permission-box">
            🎵 <strong>Permissão de Armazenamento</strong><br>
            <small style="color: var(--text-muted);">Necessário para ler suas músicas</small><br>
            <button id="requestPermBtn" class="btn-permission">📁 CONCEDER PERMISSÃO</button>
        </div>
    </div>

    <button id="scanBtn" class="btn-main" style="display: none;">🔍 ESCANEAR MÚSICAS</button>
    
    <div class="playlist" id="playlist">
        <div style="text-align:center; padding:20px; color:gray;">🎵 Aguardando permissão para acessar as músicas 🎵</div>
    </div>
</div>

<script>
// Script para APK Android - Pede permissão direto ao sistema
const playerApp = {
    audio: document.getElementById('audio'),
    songs: [],
    hasPermission: false,

    async init() {
        // Esconde popup após 2 segundos
        setTimeout(() => {
            const popup = document.getElementById('flameNeonPopup');
            if (popup) popup.style.display = 'none';
        }, 2000);
        
        // Verifica permissão no Android
        await this.checkAndroidPermission();
        
        // Configura botão de permissão
        document.getElementById('requestPermBtn').onclick = () => this.requestAndroidPermission();
        
        // Botão de escanear
        document.getElementById('scanBtn').onclick = () => this.scanMusicFiles();
    },

    // Verifica se já tem permissão (Android)
    async checkAndroidPermission() {
        try {
            // Tenta acessar um arquivo de teste (funciona no APK)
            const testFile = await new Promise((resolve) => {
                window.resolveLocalFileSystemURL ? 
                    window.resolveLocalFileSystemURL('file:///sdcard/', 
                        (entry) => resolve(true), 
                        () => resolve(false)) : resolve(false);
            });
            
            if (testFile) {
                this.hasPermission = true;
                document.getElementById('permissionArea').style.display = 'none';
                document.getElementById('scanBtn').style.display = 'block';
                document.getElementById('status').innerHTML = "✅ Permissão concedida! Clique em ESCANEAR MÚSICAS";
            } else {
                this.hasPermission = false;
                document.getElementById('status').innerHTML = "🔐 Aguardando permissão de armazenamento...";
            }
        } catch(e) {
            console.log("Permissão não concedida ainda");
            this.hasPermission = false;
        }
    },

    // Pede permissão direto para o Android (via Intent)
    requestAndroidPermission() {
        // Para APK Android - interface com o sistema
        if (window.Android && window.Android.requestPermission) {
            // Se tiver bridge nativa
            window.Android.requestPermission();
            document.getElementById('status').innerHTML = "📲 Solicitando permissão ao sistema...";
            setTimeout(() => this.checkAndroidPermission(), 1000);
        } 
        else if (window.FileAPI && window.FileAPI.requestPermission) {
            // Fallback para WebView com FileAPI
            window.FileAPI.requestPermission();
            document.getElementById('status').innerHTML = "📲 Verifique a janela de permissão do Android";
            setTimeout(() => this.checkAndroidPermission(), 2000);
        }
        else {
            // Para navegador normal - mostra instruções
            alert("🔐 PERMISSÃO DE ARMAZENAMENTO\n\n" +
                  "No ANDROID, vá em:\n" +
                  "Configurações → Apps → Ben Music Pro → Permissões → Ativar 'Arquivos e Mídia'\n\n" +
                  "Após ativar, recarregue o app e clique novamente em ESCANEAR.");
        }
        
        // Tenta novamente em 2 segundos
        setTimeout(() => {
            this.checkAndroidPermission();
        }, 3000);
    },

    // Escaneia todos os MP3 do Android
    async scanMusicFiles() {
        if (!this.hasPermission) {
            alert("⚠️ Primeiro conceda permissão de armazenamento!");
            return;
        }
        
        document.getElementById('status').innerHTML = "🔍 Escaneando toda a memória em busca de MP3...";
        document.getElementById('playlist').innerHTML = '<div style="text-align:center; padding:20px; color:#a78bfa;">🔄 Buscando músicas no Android...🔄</div>';
        
        this.songs = [];
        
        // Lista de pastas comuns no Android onde podem ter músicas
        const commonPaths = [
            '/sdcard/Music/',
            '/sdcard/Músicas/',
            '/sdcard/Download/',
            '/sdcard/media/',
            '/sdcard/DCIM/',
            '/sdcard/Movies/',
            '/sdcard/Alarms/',
            '/sdcard/Ringtones/',
            '/sdcard/Notifications/',
            '/sdcard/Podcasts/',
            '/storage/emulated/0/Music/',
            '/storage/emulated/0/Download/'
        ];
        
        let totalFound = 0;
        
        // Função para escanear cada pasta (usando entrada de arquivo)
        const scanDirectory = (path) => {
            return new Promise((resolve) => {
                try {
                    window.resolveLocalFileSystemURL(path, 
                        (directoryEntry) => {
                            const reader = directoryEntry.createReader();
                            reader.readEntries((entries) => {
                                entries.forEach(entry => {
                                    if (entry.isFile && /\.(mp3|MP3|wav|WAV|ogg|m4a)$/i.test(entry.name)) {
                                        entry.file((file) => {
                                            this.songs.push({
                                                name: entry.name,
                                                data: file,
                                                path: entry.fullPath
                                            });
                                            totalFound++;
                                            document.getElementById('status').innerHTML = `🎵 Encontradas ${totalFound} músicas...`;
                                            this.updatePlaylist();
                                        });
                                    } else if (entry.isDirectory && !entry.name.startsWith('.')) {
                                        // Escaneia subpastas (apenas 1 nível para performance)
                                        const subReader = entry.createReader();
                                        subReader.readEntries((subEntries) => {
                                            subEntries.forEach(subEntry => {
                                                if (subEntry.isFile && /\.(mp3|MP3)$/i.test(subEntry.name)) {
                                                    subEntry.file((file) => {
                                                        this.songs.push({
                                                            name: subEntry.name,
                                                            data: file,
                                                            path: subEntry.fullPath
                                                        });
                                                        totalFound++;
                                                        document.getElementById('status').innerHTML = `🎵 Encontradas ${totalFound} músicas...`;
                                                        this.updatePlaylist();
                                                    });
                                                }
                                            });
                                        });
                                    }
                                });
                                resolve(true);
                            });
                        },
                        () => resolve(false)
                    );
                } catch(e) {
                    resolve(false);
                }
            });
        };
        
        // Escaneia todas as pastas comuns
        for (const path of commonPaths) {
            await scanDirectory(path);
        }
        
        if (this.songs.length === 0) {
            document.getElementById('playlist').innerHTML = `
                <div style="text-align:center; padding:20px;">
                    ⚠️ Nenhuma música encontrada!<br><br>
                    <strong>Soluções:</strong><br>
                    1. Verifique se suas músicas estão na pasta Music ou Download<br>
                    2. Conceda permissão de armazenamento nas configurações do app<br>
                    3. Reinicie o app após dar a permissão
                </div>
            `;
            document.getElementById('status').innerHTML = "⚠️ 0 músicas encontradas. Verifique as pastas.";
        } else {
            document.getElementById('status').innerHTML = `✅ ${this.songs.length} músicas carregadas com sucesso!`;
        }
        
        document.getElementById('scanBtn').style.display = 'block';
        document.getElementById('scanBtn').innerHTML = `🔍 ESCANEAR NOVAMENTE (${this.songs.length} músicas)`;
    },

    updatePlaylist() {
        if (this.songs.length === 0) return;
        
        const playlistDiv = document.getElementById('playlist');
        playlistDiv.innerHTML = `<div style="padding:8px; font-size:12px; color:var(--primary);">📀 ${this.songs.length} músicas encontradas</div>`;
        
        // Ordena por nome
        this.songs.sort((a, b) => a.name.localeCompare(b.name));
        
        this.songs.forEach((song, idx) => {
            const div = document.createElement('div');
            div.className = 'track';
            let cleanName = song.name.replace(/\.(mp3|wav|ogg|m4a|MP3|WAV|OGG|M4A)$/i, '');
            if (cleanName.length > 50) cleanName = cleanName.substring(0, 47) + "...";
            
            div.innerText = `${idx + 1}. ${cleanName}`;
            div.onclick = () => {
                if (this.audio.src) URL.revokeObjectURL(this.audio.src);
                const url = URL.createObjectURL(song.data);
                this.audio.src = url;
                this.audio.play();
                document.getElementById('title').innerHTML = `🎵 ${cleanName}`;
                
                document.querySelectorAll('.track').forEach(t => t.classList.remove('active'));
                div.classList.add('active');
            };
            playlistDiv.appendChild(div);
        });
    }
};

// Inicia quando a página carregar
document.addEventListener('DOMContentLoaded', () => playerApp.init());
</script>

<!-- Bridge para Android (se usar WebView) -->
<script>
// Interface para comunicação com o Android nativo
if (typeof Android !== 'undefined' && Android) {
    console.log("Bridge Android detectada");
    
    // Método que o Android chama ao conceder permissão
    window.onPermissionGranted = function() {
        location.reload();
    };
}

// Fallback: tenta detectar se está em APK
if (window.navigator.userAgent.toLowerCase().includes('benmusic')) {
    console.log("App Ben Music Pro detectado");
}
</script>
</body>
</html>

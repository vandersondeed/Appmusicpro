<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Ben Music Pro - Update</title>
    <style>
        :root {
            --bg: #0f0f14; --card: #1a1a22; --primary: #7c3aed;
            --text: #e5e7eb; --text-muted: #9ca3af; --border: #2d2d3a;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); color: var(--text); font-family: sans-serif; padding: 20px; }
        
        .player-card {
            background: var(--card); border: 1px solid var(--border);
            border-radius: 24px; padding: 20px; text-align: center;
        }

        .status-badge {
            font-size: 11px; padding: 5px 10px; border-radius: 20px;
            background: rgba(124, 58, 237, 0.2); color: var(--primary);
            display: inline-block; margin-bottom: 15px;
        }

        #scanBtn {
            width: 100%; background: var(--primary); color: white;
            border: none; padding: 16px; border-radius: 12px;
            font-weight: bold; cursor: pointer; margin: 15px 0;
        }

        .playlist {
            margin-top: 20px; max-height: 300px; overflow-y: auto;
            border-radius: 10px; background: rgba(0,0,0,0.2);
        }

        .track {
            padding: 12px; border-bottom: 1px solid var(--border);
            font-size: 13px; display: flex; align-items: center; gap: 10px;
        }

        .active { background: rgba(124, 58, 237, 0.1); color: var(--primary); }

        /* Banner Flame Neon (Preservado) */
        @keyframes flamePulse { from { transform: scale(0.96); } to { transform: scale(1); } }
    </style>
</head>
<body>

<div id="flameNeonPopup" style="position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 20000; display: flex; align-items: center; justify-content: center; cursor: pointer;">
    <div style="background: #0a0a0c; border-radius: 40px; padding: 2rem; text-align: center; border: 2px solid #ff4600; animation: flamePulse 1.1s infinite alternate;">
        <div style="font-size: 2rem; font-weight: 900; color: #ff7300;">✦ IGNIS ✦</div>
        <div style="color: #ffb347; margin: 10px 0;">CREATED BY</div>
        <div style="color: #fff; font-weight: 800; font-size: 1.2rem;">VANDENSON LIMA PINHEIRO</div>
    </div>
</div>

<div class="app">
    <div class="player-card">
        <div class="status-badge" id="scanStatus">Aguardando Varredura</div>
        <h2 id="currentTrack" style="font-size: 1.1rem; margin-bottom: 10px;">Pronto para atualizar</h2>
        
        <div style="display:flex; justify-content:center; gap:20px; margin: 15px 0;">
            <button onclick="updatePlayer.prev()" style="background:none; border:none; color:white; font-size:20px;">⏮</button>
            <button id="playBtn" onclick="updatePlayer.toggle()" style="width:50px; height:50px; border-radius:50%; background:var(--primary); border:none; color:white;">▶</button>
            <button onclick="updatePlayer.next()" style="background:none; border:none; color:white; font-size:20px;">⏭</button>
        </div>
    </div>

    <button id="scanBtn">🔄 REESCANEAR MEMÓRIA E ATUALIZAR</button>
    
    <div class="playlist" id="playlist"></div>
</div>

<audio id="audioMain"></audio>

<script>
const updatePlayer = {
    audio: document.getElementById('audioMain'),
    songs: [],
    currentIndex: 0,
    db: null,

    async init() {
        this.db = await this.setupDB();
        this.setupUI();
        this.autoLoad(); // Memória automática ao abrir o APK
    },

    setupDB() {
        return new Promise(res => {
            const req = indexedDB.open("BenMusicUpdateDB", 1);
            req.onupgradeneeded = e => e.target.result.createObjectStore("settings");
            req.onsuccess = e => res(e.target.result);
        });
    },

    setupUI() {
        document.getElementById('scanBtn').onclick = () => this.requestStorageAccess();
        this.audio.onended = () => this.next();
        
        // Esconder banner
        const banner = document.getElementById('flameNeonPopup');
        banner.onclick = () => banner.style.display = 'none';
        setTimeout(() => banner.style.display = 'none', 6000);
    },

    // Pede permissão para a pasta raiz (APK mode)
    async requestStorageAccess() {
        try {
            const handle = await window.showDirectoryPicker();
            
            // Salva o "Handle" (permissão) no banco de dados do app
            const tx = this.db.transaction("settings", "readwrite");
            tx.objectStore("settings").put(handle, "rootFolder");
            
            await this.performScan(handle);
        } catch (e) {
            console.error("Permissão negada");
        }
    },

    // Varredura completa da memória Android
    async performScan(handle) {
        document.getElementById('scanStatus').innerText = "Atualizando biblioteca...";
        this.songs = [];
        const listUI = document.getElementById('playlist');
        listUI.innerHTML = "";

        const scan = async (h) => {
            for await (const entry of h.values()) {
                if (entry.kind === 'file' && entry.name.match(/\.(mp3|wav|m4a|ogg)$/i)) {
                    const file = await entry.getFile();
                    this.songs.push({ name: entry.name, data: file });
                    this.renderTrack(entry.name, this.songs.length - 1);
                } else if (entry.kind === 'directory') {
                    await scan(entry);
                }
            }
        };

        await scan(handle);
        document.getElementById('scanStatus').innerText = `${this.songs.length} Músicas encontradas`;
        if (this.songs.length > 0) this.playTrack(0, false);
    },

    // Memória para quando sair do app (Recupera ao abrir)
    async autoLoad() {
        const tx = this.db.transaction("settings", "readonly");
        const handle = await tx.objectStore("settings").get("rootFolder");
        
        if (handle) {
            // Verifica se o Android ainda permite o acesso
            const permission = await handle.queryPermission();
            if (permission === 'granted') {
                this.performScan(handle);
            } else {
                document.getElementById('scanStatus').innerText = "Toque em Atualizar para sincronizar";
            }
        }
    },

    playTrack(i, autoPlay = true) {
        this.currentIndex = i;
        if(this.audio.src) URL.revokeObjectURL(this.audio.src);
        
        this.audio.src = URL.createObjectURL(this.songs[i].data);
        document.getElementById('currentTrack').innerText = this.songs[i].name;
        
        document.querySelectorAll('.track').forEach(t => t.classList.remove('active'));
        document.getElementById(`t-${i}`).classList.add('active');
        
        if(autoPlay) {
            this.audio.play();
            document.getElementById('playBtn').innerText = "⏸";
        }
    },

    renderTrack(name, i) {
        const div = document.createElement('div');
        div.className = 'track';
        div.id = `t-${i}`;
        div.innerHTML = `<span style="opacity:0.5">${i+1}</span> ${name}`;
        div.onclick = () => this.playTrack(i);
        document.getElementById('playlist').appendChild(div);
    },

    toggle() {
        if(this.audio.paused) {
            this.audio.play();
            document.getElementById('playBtn').innerText = "⏸";
        } else {
            this.audio.pause();
            document.getElementById('playBtn').innerText = "▶";
        }
    },

    next() { if(this.songs.length) this.playTrack((this.currentIndex + 1) % this.songs.length); },
    prev() { if(this.songs.length) this.playTrack((this.currentIndex - 1 + this.songs.length) % this.songs.length); }
};

updatePlayer.init();
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Ben Music Pro</title>
    <style>
        :root {
            --bg: #09090b;
            --card: #18181b;
            --primary: #8b5cf6;
            --text-main: #fafafa;
            --text-dim: #a1a1aa;
            --accent: #ef4444; /* Cor para o botão de apagar */
            --success: #22c55e;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            background-color: var(--bg);
            color: var(--text-main);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* Splash Screen */
        #splash {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; z-index: 10000;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            transition: all 0.6s ease;
        }

        /* Layout */
        .app-content {
            flex: 1; display: flex; flex-direction: column;
            padding: 20px; gap: 15px; max-width: 500px; margin: 0 auto; width: 100%;
        }

        .player-card {
            background: linear-gradient(145deg, #1e1e2e, #111118);
            border-radius: 32px; padding: 25px; text-align: center;
            border: 1px solid rgba(255,255,255,0.05);
            box-shadow: 0 15px 35px rgba(0,0,0,0.5);
        }

        .album-art {
            width: 120px; height: 120px; background: linear-gradient(135deg, var(--primary), #4c1d95);
            margin: 0 auto 15px; border-radius: 24px; display: flex; 
            align-items: center; justify-content: center; font-size: 50px;
        }

        /* Controls */
        .progress-bar {
            width: 100%; height: 6px; background: #333;
            border-radius: 10px; margin: 15px 0 5px; overflow: hidden;
        }
        .progress-fill { width: 0%; height: 100%; background: var(--primary); }

        .main-controls { display: flex; align-items: center; justify-content: center; gap: 25px; margin-top: 10px; }
        .play-pause {
            width: 60px; height: 60px; background: var(--primary);
            border-radius: 50%; display: flex; align-items: center; justify-content: center;
            font-size: 25px; border: none; color: white;
        }

        /* Playlist Section */
        .list-container {
            flex: 1; display: flex; flex-direction: column; overflow: hidden;
            background: var(--card); border-radius: 24px; border: 1px solid #27272a;
        }
        .list-header { padding: 15px; border-bottom: 1px solid #27272a; display: flex; justify-content: space-between; align-items: center; }
        
        .playlist { flex: 1; overflow-y: auto; }
        .track-item {
            padding: 12px 15px; border-bottom: 1px solid #27272a;
            display: flex; align-items: center; gap: 12px; cursor: pointer;
        }
        .track-item.active { background: rgba(139, 92, 246, 0.1); border-left: 4px solid var(--primary); }

        /* Buttons */
        .btn-add { background: var(--success); color: white; border: none; padding: 15px; border-radius: 15px; font-weight: bold; width: 100%; }
        .btn-clear { background: none; border: none; color: var(--accent); font-size: 12px; cursor: pointer; }
        
        #loading-status { font-size: 10px; color: var(--primary); margin-top: 5px; }
    </style>
</head>
<body>

<div id="splash">
    <div style="border: 2px solid #ff4600; padding: 20px 40px; border-radius: 20px; text-align: center;">
        <h1 style="color: #ff4600; letter-spacing: 4px;">✦ IGNIS ✦</h1>
        <p style="color: #666; font-size: 10px;">VANDENSON LIMA PINHEIRO</p>
    </div>
</div>

<div class="app-content">
    <div class="player-card">
        <div class="album-art" id="art">🎵</div>
        <h2 id="title" style="font-size: 1.1rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;">Ben Music Pro</h2>
        <p id="artist" style="color: var(--text-dim); font-size: 0.8rem;">Sua biblioteca offline</p>

        <div class="progress-bar"><div class="progress-fill" id="p-fill"></div></div>
        <div class="main-controls">
            <button style="background:none; border:none; color:white; font-size:20px;" onclick="core.prev()">⏮</button>
            <button class="play-pause" onclick="core.toggle()" id="btn-play">▶</button>
            <button style="background:none; border:none; color:white; font-size:20px;" onclick="core.next()">⏭</button>
        </div>
    </div>

    <button class="btn-add" onclick="document.getElementById('f-input').click()">📥 ADICIONAR MÚSICAS</button>
    <input type="file" id="f-input" multiple accept="audio/*" style="display: none;">

    <div class="list-container">
        <div class="list-header">
            <span style="font-weight: bold; font-size: 14px;">Minhas Músicas</span>
            <button class="btn-clear" onclick="core.clearLibrary()">Limpar Biblioteca</button>
        </div>
        <div id="loading-status" style="text-align: center; display: none;">Carregando memória...</div>
        <div class="playlist" id="playlist-box"></div>
    </div>
</div>

<audio id="audio"></audio>

<script>
// Gerenciador de Banco de Dados (IndexedDB)
const dbName = "BenMusicDB";
const storeName = "songs";

const core = {
    audio: document.getElementById('audio'),
    list: [],
    idx: -1,
    db: null,

    async init() {
        // Splash Screen
        setTimeout(() => {
            document.getElementById('splash').style.opacity = '0';
            setTimeout(() => document.getElementById('splash').style.display = 'none', 600);
        }, 2000);

        // Inicializar Banco de Dados
        const request = indexedDB.open(dbName, 1);
        request.onupgradeneeded = (e) => {
            e.target.result.createObjectStore(storeName, { keyPath: "id", autoIncrement: true });
        };
        request.onsuccess = (e) => {
            this.db = e.target.result;
            this.loadFromMemory(); // Carregar músicas salvas ao iniciar
        };

        // Eventos
        document.getElementById('f-input').onchange = (e) => this.handleFiles(e.target.files);
        this.audio.ontimeupdate = () => {
            const p = (this.audio.currentTime / this.audio.duration) * 100;
            document.getElementById('p-fill').style.width = p + '%';
        };
        this.audio.onended = () => this.next();
    },

    // Salvar arquivos na memória do Android
    async handleFiles(files) {
        document.getElementById('loading-status').style.display = 'block';
        document.getElementById('loading-status').innerText = "Salvando na memória...";

        const tx = this.db.transaction(storeName, "readwrite");
        const store = tx.objectStore(storeName);

        for (let file of files) {
            const songData = {
                name: file.name.replace(/\.[^/.]+$/, "").replace(/_/g, " "),
                data: file // O arquivo Blob é salvo diretamente
            };
            store.add(songData);
        }

        tx.oncomplete = () => {
            this.loadFromMemory();
        };
    },

    // Carregar músicas da memória
    loadFromMemory() {
        document.getElementById('loading-status').style.display = 'block';
        const tx = this.db.transaction(storeName, "readonly");
        const store = tx.objectStore(storeName);
        const request = store.getAll();

        request.onsuccess = () => {
            this.list = request.result;
            this.render();
            document.getElementById('loading-status').style.display = 'none';
        };
    },

    render() {
        const box = document.getElementById('playlist-box');
        box.innerHTML = this.list.length === 0 ? 
            '<div style="padding:40px; text-align:center; color:#555;">Nenhuma música salva.</div>' : '';

        this.list.forEach((t, i) => {
            const d = document.createElement('div');
            d.className = `track-item ${this.idx === i ? 'active' : ''}`;
            d.innerHTML = `
                <div style="font-size:20px;">${this.idx === i ? '🔊' : '🎵'}</div>
                <div style="flex:1; overflow:hidden;">
                    <div style="font-weight:600; font-size:13px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;">${t.name}</div>
                    <div style="font-size:10px; color:#555;">Memória Interna</div>
                </div>
            `;
            d.onclick = () => this.play(i);
            box.appendChild(d);
        });
    },

    play(i) {
        this.idx = i;
        const track = this.list[i];
        
        // Criar URL temporária para o arquivo salvo
        if(this.audio.src) URL.revokeObjectURL(this.audio.src);
        this.audio.src = URL.createObjectURL(track.data);
        
        this.audio.play();
        document.getElementById('btn-play').innerText = '⏸';
        document.getElementById('title').innerText = track.name;
        document.getElementById('art').innerHTML = '💿';
        this.render();
    },

    toggle() {
        if(this.idx === -1 && this.list.length > 0) return this.play(0);
        if(this.audio.paused) { this.audio.play(); document.getElementById('btn-play').innerText = '⏸'; }
        else { this.audio.pause(); document.getElementById('btn-play').innerText = '▶'; }
    },

    next() { let n = this.idx + 1; if(n >= this.list.length) n = 0; this.play(n); },
    prev() { let p = this.idx - 1; if(p < 0) p = this.list.length - 1; this.play(p); },

    clearLibrary() {
        if(confirm("Deseja apagar todas as músicas salvas?")) {
            const tx = this.db.transaction(storeName, "readwrite");
            tx.objectStore(storeName).clear();
            tx.oncomplete = () => {
                this.list = [];
                this.render();
                location.reload();
            };
        }
    }
};

core.init();
</script>
</body>
</html>

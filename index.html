<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Ben Music Pro - Player Profissional</title>
    <meta name="theme-color" content="#7c3aed">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0f0f14;
            --card: #1a1a22;
            --primary: #7c3aed;
            --primary-glow: rgba(124, 58, 237, 0.5);
            --text: #e5e7eb;
            --text-muted: #9ca3af;
            --border: #2d2d3a;
            --transition: all 0.3s ease;
        }

        [data-theme="light"] {
            --bg: #f3f4f6;
            --card: #ffffff;
            --text: #111827;
            --text-muted: #6b7280;
            --border: #e5e7eb;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            padding: 20px;
            transition: background 0.3s ease;
        }

        .app { width: 100%; max-width: 450px; display: flex; flex-direction: column; gap: 20px; }

        .header { display: flex; justify-content: space-between; align-items: center; }
        
        .player-card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 32px;
            padding: 24px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
        }

        .cover-area {
            width: 100%;
            aspect-ratio: 1;
            background: linear-gradient(135deg, #2d2d3a, #111);
            border-radius: 24px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
            margin-bottom: 24px;
        }

        .visualizer {
            display: flex;
            align-items: flex-end;
            gap: 3px;
            height: 60px;
            position: absolute;
            bottom: 20px;
        }

        .bar { width: 4px; background: var(--primary); border-radius: 2px; transition: height 0.1s ease; }

        .song-info h2 { font-size: 1.4rem; margin-bottom: 4px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .song-info p { color: var(--text-muted); font-size: 0.9rem; }

        .progress-container { margin: 25px 0; }
        .progress-bar {
            width: 100%;
            height: 8px;
            background: var(--border);
            border-radius: 4px;
            cursor: pointer;
            position: relative;
        }
        .progress-fill {
            height: 100%;
            background: var(--primary);
            width: 0%;
            border-radius: 4px;
            box-shadow: 0 0 10px var(--primary-glow);
        }

        .time-info {
            display: flex;
            justify-content: space-between;
            font-size: 12px;
            margin-top: 8px;
            color: var(--text-muted);
        }

        .controls {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
        }

        .btn-icon {
            background: none;
            border: none;
            color: var(--text);
            font-size: 1.5rem;
            cursor: pointer;
            transition: var(--transition);
        }

        .btn-play {
            width: 65px;
            height: 65px;
            background: var(--primary);
            color: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.8rem;
            box-shadow: 0 10px 20px var(--primary-glow);
        }

        .volume-container {
            display: flex;
            align-items: center;
            gap: 12px;
            background: rgba(0,0,0,0.1);
            padding: 10px 15px;
            border-radius: 15px;
        }

        input[type="range"] {
            flex: 1;
            accent-color: var(--primary);
            cursor: pointer;
        }

        .tabs {
            display: flex;
            background: var(--card);
            padding: 5px;
            border-radius: 15px;
            border: 1px solid var(--border);
        }

        .tab-btn {
            flex: 1;
            padding: 10px;
            border: none;
            background: none;
            color: var(--text-muted);
            cursor: pointer;
            font-weight: 600;
            border-radius: 10px;
        }

        .tab-btn.active {
            background: var(--primary);
            color: white;
        }

        .tab-content { display: none; margin-top: 15px; }
        .tab-content.active { display: block; }

        .playlist {
            max-height: 250px;
            overflow-y: auto;
            border-radius: 15px;
        }

        .track-item {
            padding: 12px;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            gap: 10px;
            cursor: pointer;
        }

        .track-item.active {
            background: rgba(124, 58, 237, 0.1);
            color: var(--primary);
            border-left: 4px solid var(--primary);
        }

        .eq-container {
            display: flex;
            justify-content: space-around;
            height: 150px;
            align-items: center;
        }
        .eq-slider {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
            height: 100%;
        }
        .eq-slider input {
            appearance: slider-vertical;
            width: 8px;
            height: 100px;
        }

        /* Banner Flame Neon (Mantido conforme solicitado) */
        @keyframes flamePulseCustom { from { transform: scale(0.96); box-shadow: 0 0 20px #ff4400; } to { transform: scale(1); box-shadow: 0 0 40px #ff4400; } }
    </style>
</head>
<body>

<div id="flameNeonPopup" style="position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: radial-gradient(circle at center, rgba(0,0,0,0.95) 0%, #000000 100%); backdrop-filter: blur(10px); z-index: 20000; display: flex; align-items: center; justify-content: center; font-family: 'Segoe UI', system-ui, sans-serif; transition: opacity 0.4s ease, visibility 0.4s ease; opacity: 1; visibility: visible; cursor: pointer;">
    <div style="background: #0a0a0c; border-radius: 56px; padding: 2rem 2.5rem; text-align: center; max-width: 90%; width: 560px; border: 2px solid rgba(255, 70, 0, 0.9); box-shadow: 0 0 30px #ff4400, 0 0 60px rgba(255, 40, 0, 0.6), inset 0 0 20px rgba(255, 100, 0, 0.4); animation: flamePulseCustom 1.1s infinite alternate; transform: scale(0.96);">
        <div style="font-size: 2.5rem; font-weight: 900; letter-spacing: 5px; text-transform: uppercase; background: linear-gradient(135deg, #ff7300, #ffdd00, #ff4500, #ff8c00); -webkit-background-clip: text; background-clip: text; color: transparent;">✦ IGNIS ✦</div>
        <div style="color: #ffb347; margin: 15px 0;">CREATED BY</div>
        <div style="color: #fff; font-weight: 800; font-size: 1.5rem;">VANDENSON LIMA PINHEIRO</div>
        <div id="neonTimerProgress" style="width: 100%; height: 6px; background: #ff4400; margin-top: 20px; border-radius: 10px;"></div>
    </div>
</div>

<div class="app">
    <div class="header">
        <h1>Ben Music</h1>
        <button class="btn-icon" id="themeBtn">🌓</button>
    </div>

    <div class="player-card">
        <div class="cover-area">
            <span id="coverIcon" style="font-size: 5rem;">🎵</span>
            <div class="visualizer" id="visualizer"></div>
        </div>

        <div class="song-info">
            <h2 id="trackTitle">Nenhuma música</h2>
            <p id="trackArtist">Selecione uma pasta para começar</p>
        </div>

        <div class="progress-container">
            <div class="progress-bar" id="progressArea">
                <div class="progress-fill" id="progressBar"></div>
            </div>
            <div class="time-info">
                <span id="currentTime">0:00</span>
                <span id="durationTime">0:00</span>
            </div>
        </div>

        <div class="controls">
            <button class="btn-icon" id="shuffleBtn">🔀</button>
            <button class="btn-icon" id="prevBtn">⏮</button>
            <button class="btn-icon btn-play" id="playBtn">▶</button>
            <button class="btn-icon" id="nextBtn">⏭</button>
            <button class="btn-icon" id="repeatBtn">🔁</button>
        </div>

        <div class="volume-container">
            <span>🔈</span>
            <input type="range" id="volumeSlider" min="0" max="1" step="0.01" value="0.7">
            <span>🔊</span>
        </div>
    </div>

    <div class="tabs">
        <button class="tab-btn active" data-target="playlistTab">Playlist</button>
        <button class="tab-btn" data-target="eqTab">EQ</button>
    </div>

    <div id="playlistTab" class="tab-content active">
        <div style="margin-bottom: 15px; display: flex; gap: 10px;">
            <label style="flex:1; background:var(--primary); color:white; padding:12px; border-radius:12px; text-align:center; cursor:pointer; font-weight:600; font-size: 14px;">
                📂 Selecionar Pasta Completa
                <input type="file" id="folderInput" webkitdirectory directory multiple style="display:none;">
            </label>
            <button id="clearBtn" title="Limpar biblioteca" style="padding: 10px; border-radius: 12px; border: 1px solid var(--border); background: var(--card); color: var(--text); cursor:pointer;">🗑️</button>
        </div>
        <div class="playlist" id="playlistItems"></div>
    </div>

    <div id="eqTab" class="tab-content">
        <div class="eq-container" id="eqContainer"></div>
    </div>
</div>

<audio id="mainAudio" crossorigin="anonymous"></audio>

<script>
/**
 * BEN MUSIC PRO - CORE ENGINE
 */
const Player = {
    audio: document.getElementById('mainAudio'),
    playlist: [],
    currentIndex: 0,
    isPlaying: false,
    audioCtx: null,
    analyser: null,
    filters: [],
    db: null,

    async init() {
        await this.initDB();
        this.setupEventListeners();
        this.createVisualizerBars();
        this.createEqualizer();
        this.loadFromStorage();
    },

    // Configuração do IndexedDB para memória persistente
    async initDB() {
        return new Promise((resolve, reject) => {
            const request = indexedDB.open("BenMusicPRO", 1);
            request.onupgradeneeded = (e) => {
                const db = e.target.result;
                if (!db.objectStoreNames.contains("library")) {
                    db.createObjectStore("library", { keyPath: "id", autoIncrement: true });
                }
            };
            request.onsuccess = (e) => {
                this.db = e.target.result;
                resolve();
            };
            request.onerror = (e) => reject(e);
        });
    },

    setupEventListeners() {
        document.getElementById('playBtn').onclick = () => this.togglePlay();
        document.getElementById('folderInput').onchange = (e) => this.handleFolder(e.target.files);
        document.getElementById('clearBtn').onclick = () => this.clearLibrary();
        
        this.audio.ontimeupdate = () => this.updateProgress();
        this.audio.onended = () => this.next();
        
        document.getElementById('progressArea').onclick = (e) => this.seek(e);
        document.getElementById('nextBtn').onclick = () => this.next();
        document.getElementById('prevBtn').onclick = () => this.prev();
        document.getElementById('volumeSlider').oninput = (e) => this.audio.volume = e.target.value;

        // Troca de Tabs
        document.querySelectorAll('.tab-btn').forEach(btn => {
            btn.onclick = () => {
                document.querySelectorAll('.tab-btn, .tab-content').forEach(el => el.classList.remove('active'));
                btn.classList.add('active');
                document.getElementById(btn.dataset.target).classList.add('active');
            };
        });

        // Tema
        document.getElementById('themeBtn').onclick = () => {
            const current = document.documentElement.getAttribute('data-theme');
            document.documentElement.setAttribute('data-theme', current === 'light' ? 'dark' : 'light');
        };
    },

    // Processamento da pasta completa
    async handleFolder(files) {
        const audioFiles = Array.from(files).filter(f => f.type.startsWith('audio/'));
        if (audioFiles.length === 0) return;

        const transaction = this.db.transaction(["library"], "readwrite");
        const store = transaction.objectStore("library");

        for (const file of audioFiles) {
            store.add({
                name: file.name.replace(/\.[^/.]+$/, ""),
                data: file // Armazena o Blob do arquivo
            });
        }

        transaction.oncomplete = () => this.loadFromStorage();
    },

    // Carrega da memória local ao abrir o app
    async loadFromStorage() {
        const transaction = this.db.transaction(["library"], "readonly");
        const store = transaction.objectStore("library");
        const request = store.getAll();

        request.onsuccess = () => {
            const results = request.result;
            if (results.length > 0) {
                // Limpa URLs antigas para evitar leak de memória
                this.playlist.forEach(t => URL.revokeObjectURL(t.url));
                
                this.playlist = results.map(item => ({
                    id: item.id,
                    name: item.name,
                    url: URL.createObjectURL(item.data)
                }));
                this.renderPlaylist();
                if (this.audio.src === "") this.loadTrack(0, false);
            }
        };
    },

    async clearLibrary() {
        if (!confirm("Deseja apagar todas as músicas da memória?")) return;
        const transaction = this.db.transaction(["library"], "readwrite");
        transaction.objectStore("library").clear();
        transaction.oncomplete = () => {
            this.playlist.forEach(t => URL.revokeObjectURL(t.url));
            this.playlist = [];
            this.audio.src = "";
            this.renderPlaylist();
            document.getElementById('trackTitle').innerText = "Biblioteca vazia";
        };
    },

    loadTrack(index, autoPlay = true) {
        if (index < 0 || index >= this.playlist.length) return;
        this.currentIndex = index;
        const track = this.playlist[index];
        
        this.audio.src = track.url;
        document.getElementById('trackTitle').innerText = track.name;
        this.renderPlaylist();
        
        if (autoPlay && this.isPlaying) {
            this.audio.play().catch(() => {});
        }
    },

    togglePlay() {
        if (this.playlist.length === 0) return;
        if (!this.audioCtx) this.initAudioEngine();
        
        if (this.audio.paused) {
            this.audio.play();
            this.isPlaying = true;
            document.getElementById('playBtn').innerText = '⏸';
        } else {
            this.audio.pause();
            this.isPlaying = false;
            document.getElementById('playBtn').innerText = '▶';
        }
    },

    next() { this.loadTrack((this.currentIndex + 1) % this.playlist.length); },
    prev() { this.loadTrack((this.currentIndex - 1 + this.playlist.length) % this.playlist.length); },

    seek(e) {
        const rect = document.getElementById('progressArea').getBoundingClientRect();
        const pct = (e.clientX - rect.left) / rect.width;
        this.audio.currentTime = pct * this.audio.duration;
    },

    updateProgress() {
        const { currentTime, duration } = this.audio;
        if (isNaN(duration)) return;
        const pct = (currentTime / duration) * 100;
        document.getElementById('progressBar').style.width = pct + '%';
        document.getElementById('currentTime').innerText = this.formatTime(currentTime);
        document.getElementById('durationTime').innerText = this.formatTime(duration);
    },

    formatTime(sec) {
        const m = Math.floor(sec / 60);
        const s = Math.floor(sec % 60);
        return `${m}:${s < 10 ? '0' : ''}${s}`;
    },

    renderPlaylist() {
        const container = document.getElementById('playlistItems');
        container.innerHTML = this.playlist.map((t, i) => `
            <div class="track-item ${i === this.currentIndex ? 'active' : ''}" onclick="Player.loadTrack(${i})">
                <span style="opacity:0.5">${i + 1}</span>
                <div style="flex:1; overflow:hidden; white-space:nowrap; text-overflow:ellipsis;">
                    <strong>${t.name}</strong>
                </div>
            </div>
        `).join('');
    },

    async initAudioEngine() {
        this.audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        const source = this.audioCtx.createMediaElementSource(this.audio);
        
        const freqs = [60, 250, 1000, 4000, 12000];
        let lastNode = source;

        this.filters = freqs.map(f => {
            const filter = this.audioCtx.createBiquadFilter();
            filter.type = 'peaking';
            filter.frequency.value = f;
            lastNode.connect(filter);
            lastNode = filter;
            return filter;
        });

        this.analyser = this.audioCtx.createAnalyser();
        this.analyser.fftSize = 64;
        lastNode.connect(this.analyser);
        this.analyser.connect(this.audioCtx.destination);
        this.animateVisualizer();
    },

    createVisualizerBars() {
        const vis = document.getElementById('visualizer');
        for (let i = 0; i < 16; i++) {
            const bar = document.createElement('div');
            bar.className = 'bar';
            vis.appendChild(bar);
        }
    },

    animateVisualizer() {
        const data = new Uint8Array(this.analyser.frequencyBinCount);
        const bars = document.querySelectorAll('.bar');
        const draw = () => {
            requestAnimationFrame(draw);
            if (this.audio.paused) return;
            this.analyser.getByteFrequencyData(data);
            bars.forEach((bar, i) => {
                const val = (data[i] / 255) * 60;
                bar.style.height = Math.max(4, val) + 'px';
            });
        };
        draw();
    },

    createEqualizer() {
        const container = document.getElementById('eqContainer');
        const labels = ['60Hz', '250Hz', '1kHz', '4kHz', '12kHz'];
        labels.forEach((l, i) => {
            const div = document.createElement('div');
            div.className = 'eq-slider';
            div.innerHTML = `
                <input type="range" min="-12" max="12" value="0" oninput="Player.filters[${i}].gain.value = this.value">
                <span style="font-size:10px">${l}</span>
            `;
            container.appendChild(div);
        });
    }
};

// Iniciar App
Player.init();

// Lógica do Banner (Preservada conforme solicitado)
const popup = document.getElementById('flameNeonPopup');
if(popup) {
    popup.onclick = () => popup.remove();
    setTimeout(() => {
        popup.style.opacity = '0';
        setTimeout(() => popup.remove(), 500);
    }, 15000);
}
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Ben Music Pro - Player Ultra</title>
<meta name="theme-color" content="#7c3aed">
<style>
:root {
    --bg: #0a0a0f;
    --card: #15151e;
    --primary: #8b5cf6;
    --primary-glow: rgba(139, 92, 246, 0.4);
    --text: #f3f4f6;
    --text-muted: #9ca3af;
    --border: #262635;
    --accent: #10b981;
}

* { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

body { 
    background: var(--bg); 
    color: var(--text); 
    font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
    display: flex;
    justify-content: center;
    min-height: 100vh;
}

.app-container {
    width: 100%;
    max-width: 500px;
    padding: 15px;
    display: flex;
    flex-direction: column;
    gap: 15px;
}

/* Splash Screen */
#splash {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    background: #000; z-index: 9999;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    transition: opacity 0.5s ease;
}

.player-card {
    background: var(--card);
    border-radius: 30px;
    padding: 25px;
    border: 1px solid var(--border);
    box-shadow: 0 10px 40px rgba(0,0,0,0.5);
    text-align: center;
}

.now-playing-title {
    font-size: 1.2rem;
    font-weight: 700;
    margin: 15px 0 5px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    color: var(--primary);
}

/* Controles Customizados */
.controls-main {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 20px;
    margin: 20px 0;
}

.btn-circle {
    background: var(--border);
    border: none;
    color: white;
    width: 50px;
    height: 50px;
    border-radius: 50%;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
}

.btn-play {
    width: 65px;
    height: 65px;
    background: var(--primary);
    box-shadow: 0 0 15px var(--primary-glow);
}

/* Busca e Playlist */
.search-box {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 15px;
    padding: 12px 20px;
    width: 100%;
    color: white;
    margin-bottom: 10px;
}

.playlist-area {
    background: var(--card);
    border-radius: 20px;
    flex-grow: 1;
    overflow-y: auto;
    border: 1px solid var(--border);
    max-height: 400px;
}

.track-item {
    padding: 15px 20px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 15px;
    cursor: pointer;
    transition: 0.2s;
}

.track-item:active { background: rgba(139, 92, 246, 0.1); }
.track-item.active { 
    background: rgba(139, 92, 246, 0.15);
    border-left: 4px solid var(--primary);
}

.track-info h4 { font-size: 14px; margin-bottom: 2px; }
.track-info p { font-size: 12px; color: var(--text-muted); }

.hidden-input { display: none; }

.btn-import {
    background: var(--accent);
    color: white;
    border: none;
    padding: 15px;
    border-radius: 15px;
    font-weight: bold;
    width: 100%;
    cursor: pointer;
    margin-bottom: 10px;
}
</style>
</head>
<body>

<div id="splash">
    <h1 style="color: #ff4600; font-size: 2.5rem; letter-spacing: 5px;">IGNIS</h1>
    <p style="color: #666; font-size: 12px; margin-top: 10px;">VANDENSON LIMA PINHEIRO</p>
</div>

<div class="app-container">
    <div class="player-card">
        <div id="visualizer" style="color: var(--primary); font-size: 40px;">🎵</div>
        <div class="now-playing-title" id="currentTitle">Ben Music Pro</div>
        <p id="currentArtist" style="font-size: 13px; color: var(--text-muted);">Selecione suas músicas</p>
        
        <audio id="mainAudio"></audio>
        
        <div class="controls-main">
            <button class="btn-circle" onclick="player.prev()">⏮</button>
            <button class="btn-circle btn-play" id="playPauseBtn" onclick="player.togglePlay()">▶</button>
            <button class="btn-circle" onclick="player.next()">⏭</button>
        </div>
        
        <div style="display: flex; justify-content: space-between; font-size: 11px; color: var(--text-muted);">
            <span id="timeCurrent">0:00</span>
            <span id="timeTotal">0:00</span>
        </div>
    </div>

    <!-- Importador para Android -->
    <button class="btn-import" onclick="document.getElementById('fileInput').click()">
        📥 ADICIONAR MÚSICAS DO DISPOSITIVO
    </button>
    <input type="file" id="fileInput" class="hidden-input" multiple accept="audio/*">

    <input type="text" class="search-box" id="searchTrack" placeholder="🔍 Buscar na sua biblioteca...">

    <div class="playlist-area" id="playlist">
        <div style="text-align:center; padding:40px; color:gray; font-size: 14px;">
            Sua biblioteca está vazia.<br>Clique no botão verde acima.
        </div>
    </div>
</div>

<script>
const player = {
    audio: document.getElementById('mainAudio'),
    list: [],
    currentIndex: 0,
    isPlaying: false,

    init() {
        // Splash screen
        setTimeout(() => document.getElementById('splash').style.opacity = '0', 2500);
        setTimeout(() => document.getElementById('splash').style.display = 'none', 3000);

        // Eventos de Audio
        this.audio.ontimeupdate = () => this.updateProgress();
        this.audio.onended = () => this.next();
        
        // Input de arquivos
        document.getElementById('fileInput').onchange = (e) => this.loadFiles(e.target.files);
        
        // Busca
        document.getElementById('searchTrack').oninput = (e) => this.filterList(e.target.value);
    },

    loadFiles(files) {
        if (files.length === 0) return;
        
        const newTracks = Array.from(files).map(file => ({
            name: this.cleanName(file.name),
            file: file,
            id: Math.random().toString(36).substr(2, 9)
        }));

        this.list = [...this.list, ...newTracks];
        this.renderPlaylist(this.list);
        alert(`${newTracks.length} músicas adicionadas!`);
    },

    cleanName(name) {
        return name.replace(/\.(mp3|wav|ogg|m4a|flac)$/i, '')
                   .replace(/_/g, ' ')
                   .replace(/-/g, ' - ');
    },

    renderPlaylist(tracks) {
        const container = document.getElementById('playlist');
        container.innerHTML = '';

        tracks.forEach((track, index) => {
            const div = document.createElement('div');
            div.className = `track-item ${this.currentIndex === index && this.isPlaying ? 'active' : ''}`;
            div.innerHTML = `
                <div style="font-size: 20px;">📻</div>
                <div class="track-info">
                    <h4>${track.name}</h4>
                    <p>Arquivo Local</p>
                </div>
            `;
            div.onclick = () => this.playTrack(index);
            container.appendChild(div);
        });
    },

    playTrack(index) {
        if (this.list.length === 0) return;
        
        this.currentIndex = index;
        const track = this.list[index];
        
        if (this.audio.src) URL.revokeObjectURL(this.audio.src);
        
        this.audio.src = URL.createObjectURL(track.file);
        this.audio.play();
        this.isPlaying = true;
        
        document.getElementById('playPauseBtn').innerText = '⏸';
        document.getElementById('currentTitle').innerText = track.name;
        document.getElementById('visualizer').innerHTML = '🎼';
        
        this.renderPlaylist(this.list);
    },

    togglePlay() {
        if (this.list.length === 0) return;
        if (this.audio.paused) {
            this.audio.play();
            this.isPlaying = true;
            document.getElementById('playPauseBtn').innerText = '⏸';
        } else {
            this.audio.pause();
            this.isPlaying = false;
            document.getElementById('playPauseBtn').innerText = '▶';
        }
    },

    next() {
        let nextIndex = this.currentIndex + 1;
        if (nextIndex >= this.list.length) nextIndex = 0;
        this.playTrack(nextIndex);
    },

    prev() {
        let prevIndex = this.currentIndex - 1;
        if (prevIndex < 0) prevIndex = this.list.length - 1;
        this.playTrack(prevIndex);
    },

    updateProgress() {
        const cur = this.audio.currentTime;
        const dur = this.audio.duration;
        if (dur) {
            document.getElementById('timeCurrent').innerText = this.formatTime(cur);
            document.getElementById('timeTotal').innerText = this.formatTime(dur);
        }
    },

    formatTime(secs) {
        const min = Math.floor(secs / 60);
        const s = Math.floor(secs % 60);
        return `${min}:${s < 10 ? '0' : ''}${s}`;
    },

    filterList(query) {
        const filtered = this.list.filter(t => 
            t.name.toLowerCase().includes(query.toLowerCase())
        );
        this.renderPlaylist(filtered);
    }
};

player.init();
</script>
</body>
</html>

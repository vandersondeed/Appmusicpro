<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Ben Music Pro - Player Avançado</title>
<meta name="theme-color" content="#7c3aed">
<style>
/* ... (Mantendo os estilos originais do seu ficheiro) ... */
* { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
:root { --bg: #0f0f14; --card: #1a1a22; --primary: #7c3aed; --primary-dark: #6d28d9; --primary-glow: #a78bfa; --text: #e5e7eb; --text-muted: #9ca3af; --border: #2d2d3a; --success: #10b981; --error: #ef4444; --warning: #f59e0b; --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
body { background: var(--bg); color: var(--text); min-height: 100vh; display: flex; justify-content: center; padding: 16px; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; }
.app { width: 100%; max-width: 550px; display: flex; flex-direction: column; gap: 20px; }
.player-card { background: var(--card); border: 1px solid var(--border); border-radius: 28px; padding: 24px; box-shadow: 0 8px 32px rgba(0,0,0,0.2); }
.btn-main { width: 100%; background: var(--primary); color: white; border: none; padding: 18px; border-radius: 16px; font-weight: 800; cursor: pointer; margin-top: 10px; }
.playlist { background: var(--card); border: 1px solid var(--border); border-radius: 20px; padding: 8px; max-height: 300px; overflow-y: auto; margin-top: 10px; }
.track { padding: 12px; border-bottom: 1px solid var(--border); font-size: 13px; cursor: pointer; }
.track.active { background: rgba(124, 58, 237, 0.15); border-left: 3px solid var(--primary); }
</style>
</head>
<body>

<div id="flameNeonPopup" style="position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 20000; display: flex; align-items: center; justify-content: center; cursor: pointer;">
    <div style="background: #0a0a0c; border-radius: 40px; padding: 2rem; text-align: center; border: 2px solid #ff4600;">
        <div style="font-size: 2rem; font-weight: 900; color: #ff7300;">✦ IGNIS ✦</div>
        <div style="color: #fff; font-weight: 800;">VANDENSON LIMA PINHEIRO</div>
    </div>
</div>

<div class="app">
    <div class="player-card">
        <h2 id="title">Ben Music Pro</h2>
        <p id="status" style="color: var(--text-muted); font-size: 12px;">Aguardando permissão...</p>
        <audio id="audio" style="width: 100%; margin-top: 20px;" controls></audio>
    </div>

    <button id="scanBtn" class="btn-main">🔍 ESCANEAR MEMÓRIA ANDROID</button>
    
    <div class="playlist" id="playlist">
        <div style="text-align:center; padding:20px; color:gray;">Nenhuma música carregada</div>
    </div>
</div>

<script>
const playerApp = {
    audio: document.getElementById('audio'),
    songs: [],
    db: null,

    async init() {
        this.db = await this.openDB();
        document.getElementById('scanBtn').onclick = () => this.requestPermission();
        this.checkPreviousPermission();
        
        // Esconder banner
        setTimeout(() => document.getElementById('flameNeonPopup').style.display = 'none', 3000);
    },

    openDB() {
        return new Promise((resolve) => {
            const request = indexedDB.open("BenMusicDB", 1);
            request.onupgradeneeded = (e) => e.target.result.createObjectStore("settings");
            request.onsuccess = (e) => resolve(e.target.result);
        });
    },

    // ESTA FUNÇÃO CORRIGE O ERRO DA IMAGEM
    async requestPermission() {
        try {
            if (!window.showDirectoryPicker) {
                alert("O seu navegador não suporta a varredura de pastas. Use o Chrome no Android.");
                return;
            }

            // Solicita acesso real à pasta (Gatilho de segurança do Android)
            const dirHandle = await window.showDirectoryPicker();
            
            // Guarda o acesso no IndexedDB para o futuro
            const tx = this.db.transaction("settings", "readwrite");
            await tx.objectStore("settings").put(dirHandle, "lastFolder");
            
            this.scan(dirHandle);
        } catch (err) {
            console.error(err);
            alert("É necessário conceder permissão à pasta para listar as músicas.");
        }
    },

    async checkPreviousPermission() {
        const tx = this.db.transaction("settings", "readonly");
        const handle = await tx.objectStore("settings").get("lastFolder");
        
        if (handle) {
            const status = await handle.queryPermission();
            if (status === 'granted') {
                this.scan(handle);
            } else {
                document.getElementById('status').innerText = "Toque no botão para reativar o acesso.";
            }
        }
    },

    async scan(handle) {
        document.getElementById('status').innerText = "A escanear ficheiros...";
        this.songs = [];
        const playlistDiv = document.getElementById('playlist');
        playlistDiv.innerHTML = "";

        const recursiveScan = async (h) => {
            for await (const entry of h.values()) {
                if (entry.kind === 'file' && /\.(mp3|wav|ogg|m4a)$/i.test(entry.name)) {
                    const file = await entry.getFile();
                    this.songs.push({ name: entry.name, data: file });
                    this.addTrackToUI(entry.name, this.songs.length - 1);
                } else if (entry.kind === 'directory') {
                    await recursiveScan(entry);
                }
            }
        };

        await recursiveScan(handle);
        document.getElementById('status').innerText = `${this.songs.length} músicas encontradas.`;
    },

    addTrackToUI(name, index) {
        const div = document.createElement('div');
        div.className = 'track';
        div.innerText = `${index + 1}. ${name}`;
        div.onclick = () => {
            if (this.audio.src) URL.revokeObjectURL(this.audio.src);
            this.audio.src = URL.createObjectURL(this.songs[index].data);
            this.audio.play();
            document.getElementById('title').innerText = name;
            
            document.querySelectorAll('.track').forEach(t => t.classList.remove('active'));
            div.classList.add('active');
        };
        document.getElementById('playlist').appendChild(div);
    }
};

playerApp.init();
</script>
</body>
</html>

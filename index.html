<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Ben Music Pro - Player Avançado</title>
<meta name="theme-color" content="#7c3aed">
<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    -webkit-tap-highlight-color: transparent;
}

:root {
    --bg: #0f0f14;
    --card: #1a1a22;
    --primary: #7c3aed;
    --primary-dark: #6d28d9;
    --primary-glow: #a78bfa;
    --text: #e5e7eb;
    --text-muted: #9ca3af;
    --border: #2d2d3a;
    --success: #10b981;
    --error: #ef4444;
    --warning: #f59e0b;
    --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
}

[data-theme="light"] {
    --bg: #f3f4f6;
    --card: #ffffff;
    --primary: #7c3aed;
    --primary-dark: #6d28d9;
    --primary-glow: #8b5cf6;
    --text: #111827;
    --text-muted: #6b7280;
    --border: #e5e7eb;
}

body {
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    justify-content: center;
    padding: 16px;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    transition: var(--transition);
}

.app {
    width: 100%;
    max-width: 550px;
    display: flex;
    flex-direction: column;
    gap: 20px;
    animation: fadeIn 0.5s ease;
}

@keyframes fadeIn {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
}

.header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 8px 4px;
}

.header h1 {
    font-size: 26px;
    font-weight: 800;
    background: linear-gradient(135deg, var(--primary), var(--primary-glow));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    letter-spacing: -0.5px;
}

.icon-btn {
    background: var(--card);
    border: 1px solid var(--border);
    color: var(--text);
    width: 44px;
    height: 44px;
    border-radius: 14px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: var(--transition);
}

.icon-btn:hover {
    transform: scale(1.05);
    border-color: var(--primary);
}

.player-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 28px;
    padding: 24px;
    box-shadow: 0 8px 32px rgba(0,0,0,0.2);
    transition: var(--transition);
}

.cover-wrap {
    position: relative;
    margin-bottom: 20px;
}

.cover {
    width: 100%;
    aspect-ratio: 1;
    background: linear-gradient(135deg, var(--border), var(--card));
    border-radius: 20px;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    position: relative;
}

.cover img, .cover canvas {
    width: 100%;
    height: 100%;
    object-fit: cover;
}

.cover svg {
    width: 35%;
    height: 35%;
    opacity: 0.4;
}

.visualizer {
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    height: 80px;
    background: linear-gradient(transparent, rgba(0,0,0,0.7));
    display: flex;
    align-items: flex-end;
    justify-content: center;
    gap: 3px;
    padding: 10px;
}

.visualizer-bar {
    width: 3px;
    background: var(--primary);
    border-radius: 2px;
    transition: height 0.1s ease;
}

.lyrics-box {
    position: absolute;
    bottom: 16px;
    left: 16px;
    right: 16px;
    background: rgba(0,0,0,0.85);
    backdrop-filter: blur(12px);
    padding: 12px 16px;
    border-radius: 12px;
    font-size: 14px;
    text-align: center;
    color: white;
    max-height: 80px;
    overflow-y: auto;
    display: none;
    font-weight: 500;
    line-height: 1.4;
}

.lyrics-box.active {
    display: block;
    animation: slideUp 0.3s ease;
}

@keyframes slideUp {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
}

.song-info {
    text-align: center;
    margin-bottom: 20px;
}

.song-info h2 {
    font-size: 20px;
    font-weight: 700;
    margin-bottom: 6px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
}

.song-info p {
    font-size: 13px;
    color: var(--text-muted);
}

.progress-area {
    margin-bottom: 20px;
}

.time {
    display: flex;
    justify-content: space-between;
    font-size: 12px;
    color: var(--text-muted);
    margin-bottom: 8px;
}

.progress-bar {
    width: 100%;
    height: 6px;
    background: var(--border);
    border-radius: 10px;
    cursor: pointer;
    position: relative;
    overflow: hidden;
}

.progress {
    height: 100%;
    width: 0%;
    background: linear-gradient(90deg, var(--primary), var(--primary-glow));
    border-radius: 10px;
    position: relative;
    transition: width 0.1s linear;
}

.progress::after {
    content: '';
    position: absolute;
    right: -4px;
    top: 50%;
    transform: translateY(-50%);
    width: 12px;
    height: 12px;
    background: var(--primary);
    border-radius: 50%;
    opacity: 0;
    transition: opacity 0.2s;
}

.progress-bar:hover .progress::after {
    opacity: 1;
}

.controls {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 20px;
    gap: 8px;
}

.controls button {
    background: var(--card);
    border: 1px solid var(--border);
    color: var(--text);
    cursor: pointer;
    padding: 10px;
    border-radius: 50%;
    width: 44px;
    height: 44px;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: var(--transition);
}

.controls button:hover {
    transform: scale(1.05);
    border-color: var(--primary);
}

.controls button.main {
    background: linear-gradient(135deg, var(--primary), var(--primary-dark));
    border: none;
    width: 56px;
    height: 56px;
    color: white;
}

.controls button.main:hover {
    transform: scale(1.08);
}

.volume {
    display: flex;
    align-items: center;
    gap: 12px;
}

.volume input {
    flex: 1;
    height: 4px;
    border-radius: 5px;
    background: var(--border);
    accent-color: var(--primary);
}

.tabs {
    display: flex;
    gap: 10px;
    margin-bottom: 4px;
}

.tab {
    flex: 1;
    padding: 12px;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 14px;
    color: var(--text-muted);
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    text-align: center;
    transition: var(--transition);
}

.tab.active {
    background: var(--primary);
    color: white;
    border-color: var(--primary);
}

.tab-content {
    display: none;
    animation: fadeIn 0.3s ease;
}

.tab-content.active {
    display: block;
}

.load-buttons {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    margin-bottom: 12px;
}

.load-btn {
    padding: 14px;
    background: var(--primary);
    border: none;
    border-radius: 14px;
    color: white;
    font-weight: 600;
    font-size: 14px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    transition: var(--transition);
    position: relative;
    overflow: hidden;
}

.load-btn::before {
    content: '';
    position: absolute;
    top: 50%;
    left: 50%;
    width: 0;
    height: 0;
    border-radius: 50%;
    background: rgba(255, 255, 255, 0.3);
    transform: translate(-50%, -50%);
    transition: width 0.6s, height 0.6s;
}

.load-btn:active::before {
    width: 300px;
    height: 300px;
}

.load-btn:hover {
    transform: translateY(-2px);
    filter: brightness(1.05);
}

.load-btn.secondary {
    background: var(--border);
}

.load-btn.auto {
    background: var(--success);
    grid-column: 1 / -1;
}

.load-btn.auto.active {
    background: var(--primary);
}

.load-btn.press-effect {
    transform: scale(0.95);
}

.toast {
    position: fixed;
    bottom: 30px;
    left: 50%;
    transform: translateX(-50%) translateY(100px);
    background: var(--card);
    color: var(--text);
    padding: 14px 24px;
    border-radius: 50px;
    font-size: 14px;
    font-weight: 500;
    z-index: 1000;
    opacity: 0;
    pointer-events: none;
    transition: all 0.3s ease;
    box-shadow: 0 8px 24px rgba(0,0,0,0.2);
    border: 1px solid var(--border);
    white-space: nowrap;
}

.toast.show {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
}

.folder-info {
    font-size: 12px;
    color: var(--text-muted);
    text-align: center;
    margin-bottom: 12px;
    padding: 10px;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    display: none;
    gap: 8px;
    align-items: center;
    justify-content: center;
}

.folder-info.show {
    display: flex;
}

.playlist {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 8px;
    max-height: 300px;
    overflow-y: auto;
}

.playlist::-webkit-scrollbar {
    width: 6px;
}

.playlist::-webkit-scrollbar-track {
    background: var(--border);
    border-radius: 3px;
}

.playlist::-webkit-scrollbar-thumb {
    background: var(--primary);
    border-radius: 3px;
}

.playlist-item {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 10px 12px;
    border-radius: 12px;
    cursor: pointer;
    transition: var(--transition);
}

.playlist-item:hover {
    background: var(--border);
    transform: translateX(4px);
}

.playlist-item.active {
    background: rgba(124, 58, 237, 0.15);
    border-left: 3px solid var(--primary);
}

.playlist-item.num {
    color: var(--text-muted);
    font-size: 12px;
    font-weight: 600;
    min-width: 28px;
}

.playlist-item.info {
    flex: 1;
    overflow: hidden;
}

.playlist-item.title {
    font-weight: 500;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    font-size: 14px;
}

.playlist-item.path {
    font-size: 11px;
    color: var(--text-muted);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    margin-top: 2px;
}

.eq-controls {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 12px;
    padding: 20px 0;
}

.eq-band {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 10px;
}

.eq-band input {
    writing-mode: bt-lr;
    -webkit-appearance: slider-vertical;
    width: 8px;
    height: 120px;
    background: var(--border);
    border-radius: 4px;
}

.eq-band span {
    font-size: 11px;
    font-weight: 600;
    color: var(--text-muted);
}

.eq-presets {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
    margin-top: 12px;
}

.preset-btn {
    padding: 8px 16px;
    background: var(--border);
    border: none;
    border-radius: 10px;
    color: var(--text);
    font-size: 12px;
    font-weight: 500;
    cursor: pointer;
    transition: var(--transition);
}

.preset-btn:hover {
    transform: translateY(-1px);
}

.preset-btn.active {
    background: var(--primary);
    color: white;
}

input[type="file"] {
    display: none;
}

.empty {
    text-align: center;
    color: var(--text-muted);
    padding: 40px 20px;
    font-size: 14px;
}

.badge {
    position: absolute;
    top: 12px;
    right: 12px;
    background: rgba(0,0,0,0.7);
    backdrop-filter: blur(8px);
    padding: 4px 10px;
    border-radius: 20px;
    font-size: 11px;
    color: white;
    display: none;
}

.badge.show {
    display: block;
}

.press-indicator {
    position: fixed;
    bottom: 100px;
    left: 50%;
    transform: translateX(-50%);
    background: var(--primary);
    color: white;
    padding: 8px 16px;
    border-radius: 20px;
    font-size: 12px;
    font-weight: 600;
    z-index: 1000;
    opacity: 0;
    transition: opacity 0.3s;
    pointer-events: none;
    white-space: nowrap;
}

.press-indicator.show {
    opacity: 1;
}

.progress-ring {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: 60px;
    height: 60px;
    border-radius: 50%;
    background: rgba(0,0,0,0.5);
    backdrop-filter: blur(4px);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 20px;
    font-weight: bold;
    color: white;
    opacity: 0;
    transition: opacity 0.2s;
    pointer-events: none;
}

.progress-ring.show {
    opacity: 1;
}
</style>
</head>
<body>

<!-- ========== POP-UP NEON EM CHAMAS (25 SEGUNDOS) - SEM ALTERAR O SCRIPT ORIGINAL ========== -->
<div id="flameNeonPopup" style="position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: radial-gradient(circle at center, rgba(0,0,0,0.95) 0%, #000000 100%); backdrop-filter: blur(10px); z-index: 20000; display: flex; align-items: center; justify-content: center; font-family: 'Segoe UI', system-ui, sans-serif; transition: opacity 0.4s ease, visibility 0.4s ease; opacity: 1; visibility: visible; cursor: pointer;">
    <div style="background: #0a0a0c; border-radius: 56px; padding: 2rem 2.5rem; text-align: center; max-width: 90%; width: 560px; border: 2px solid rgba(255, 70, 0, 0.9); box-shadow: 0 0 30px #ff4400, 0 0 60px rgba(255, 40, 0, 0.6), inset 0 0 20px rgba(255, 100, 0, 0.4); animation: flamePulseCustom 1.1s infinite alternate; transform: scale(0.96); transition: transform 0.25s cubic-bezier(0.2, 0.9, 0.4, 1.1);">
        <div style="font-size: 2.5rem; font-weight: 900; letter-spacing: 5px; text-transform: uppercase; background: linear-gradient(135deg, #ff7300, #ffdd00, #ff4500, #ff8c00); background-size: 300% 300%; -webkit-background-clip: text; background-clip: text; color: transparent; animation: fireGradientCustom 1.3s ease infinite, textFlickerCustom 0.08s infinite; text-shadow: 0 0 8px #ff4d00, 0 0 18px #ff0000, 0 0 25px #ff6600; margin-bottom: 12px;">✦ IGNIS ✦</div>
        <div style="font-size: 1.7rem; font-weight: 800; letter-spacing: 3px; background: linear-gradient(135deg, #ffb347, #ff7e05, #ff5500); -webkit-background-clip: text; background-clip: text; color: transparent; text-shadow: 0 0 6px #ff3300;">CREATED BY</div>
        <div style="font-size: 2rem; font-weight: 800; background: #0b0b0f; color: #1f1f24; text-shadow: 0 0 4px #ff4400, 0 0 8px #ff3300, 0 0 14px #ff2200; padding: 12px 20px; border-radius: 60px; display: inline-block; margin: 18px 0 12px; letter-spacing: 2px; border: 1px solid rgba(255, 80, 0, 0.7); backdrop-filter: blur(4px); font-family: monospace; background: linear-gradient(145deg, #030303, #111); -webkit-text-stroke: 0.6px #ff5e00;">VANDENSON LIMA PINHEIRO</div>
        <div style="font-size: 1rem; font-weight: bold; color: #ffb347; text-shadow: 0 0 6px #ff3300, 0 0 3px #ff8c00; background: rgba(0,0,0,0.6); display: inline-block; padding: 6px 20px; border-radius: 40px; letter-spacing: 1px; margin-bottom: 20px;">🔥 BANNER EM CHAMAS 🔥</div>
        <div style="margin-top: 16px; width: 100%; height: 6px; background: #2a1a0e; border-radius: 10px; overflow: hidden; box-shadow: inset 0 1px 3px #00000066;">
            <div id="neonTimerProgress" style="width: 100%; height: 100%; background: linear-gradient(90deg, #ff7e05, #ff3300, #ff9f00); border-radius: 10px; box-shadow: 0 0 6px #ff6600;"></div>
        </div>
        <div style="margin-top: 20px; font-size: 0.7rem; color: #ffaa66; text-shadow: 0 0 3px #ff4400; background: rgba(0,0,0,0.6); display: inline-block; padding: 5px 14px; border-radius: 50px; font-weight: 500;">✨ clique em qualquer lugar para fechar ✨</div>
    </div>
</div>

<style>
    @keyframes flamePulseCustom {
        0% { box-shadow: 0 0 15px rgba(255, 70, 0, 0.6), 0 0 30px rgba(255, 40, 0, 0.4), inset 0 0 8px rgba(255, 100, 0, 0.3); border-color: rgba(255, 80, 0, 0.9); }
        100% { box-shadow: 0 0 40px rgba(255, 100, 0, 1), 0 0 70px rgba(255, 40, 0, 0.8), inset 0 0 25px rgba(255, 80, 0, 0.6); border-color: #ff7c2e; }
    }
    @keyframes fireGradientCustom {
        0% { background-position: 0% 50%; }
        50% { background-position: 100% 50%; }
        100% { background-position: 0% 50%; }
    }
    @keyframes textFlickerCustom {
        0% { text-shadow: 0 0 5px #ff4400, 0 0 12px #ff2200; opacity: 1; }
        25% { text-shadow: 0 0 2px #ff7700, 0 0 16px #ff3c00; }
        50% { text-shadow: 0 0 10px #ff5500, 0 0 20px #ff2a00; opacity: 0.98; }
        100% { text-shadow: 0 0 7px #ff6a00, 0 0 18px #ff4400; }
    }
</style>

<script>
    // Popup de 25 segundos (NÃO ALTERA NADA NO PLAYER ORIGINAL)
    (function() {
        const popup = document.getElementById('flameNeonPopup');
        if (!popup) return;
        let startTime = Date.now();
        let timerAnimation = null;
        let autoCloseTimeout = null;
        let isClosed = false;

        const timerBar = document.getElementById('neonTimerProgress');
        
        function closePopup() {
            if (isClosed) return;
            isClosed = true;
            if (autoCloseTimeout) clearTimeout(autoCloseTimeout);
            if (timerAnimation) cancelAnimationFrame(timerAnimation);
            if (popup) {
                popup.style.opacity = '0';
                popup.style.visibility = 'hidden';
                setTimeout(() => {
                    if (popup && popup.parentNode) popup.parentNode.removeChild(popup);
                }, 400);
            }
        }

        function updateTimer() {
            const elapsed = (Date.now() - startTime) / 1000;
            const remaining = Math.max(0, 25 - elapsed);
            const percent = (remaining / 25) * 100;
            if (timerBar) timerBar.style.width = percent + '%';
            if (remaining <= 0) {
                closePopup();
            } else {
                timerAnimation = requestAnimationFrame(updateTimer);
            }
        }

        // Fechar após 25 segundos
        autoCloseTimeout = setTimeout(() => {
            closePopup();
        }, 25000);

        // Iniciar animação da barra
        timerAnimation = requestAnimationFrame(updateTimer);

        // Fechar ao clicar no popup (qualquer lugar)
        popup.addEventListener('click', (e) => {
            e.stopPropagation();
            closePopup();
        });
    })();
</script>

<script>
// ==================== CONFIGURAÇÃO INICIAL ====================
const audio = document.getElementById('audio');
let audioContext = null;
let source = null;
let filters = [];
let isAudioContextInitialized = false;

// Elementos DOM

};

// Estado da aplicação
let state = {
    songs: [],
    lyrics: {},
    currentIndex: 0,
    isShuffle: false,
    isRepeat: false,
    currentLyrics: [],
    dirHandle: null,
    autoScanActive: false,

    eqPresets: {
        flat: [0, 0, 0, 0, 0],
        bass: [6, 4, 0, -2, -3],
        pop: [-2, 2, 3, 2, 1],
        rock: [4, 3, -1, -2, -2],
        classical: [-1, -1, 0, 2, 4],
        jazz: [2, 3, 1, 1, 2]
    }
};

// ==================== FUNÇÕES AUXILIARES ====================
function showToast(message, duration = 2000) {
    elements.toast.textContent = message;
    elements.toast.classList.add('show');
    setTimeout(() => elements.toast.classList.remove('show'), duration);
}

function formatTime(seconds) {
    if (isNaN(seconds)) return '0:00';
    const mins = Math.floor(seconds / 60);
    const secs = Math.floor(seconds % 60);
    return `${mins}:${secs.toString().padStart(2, '0')}`;
}

// ==================== FUNÇÃO DE PRESSÃO PROLONGADA ====================
function setupLongPress(element, onLongPress, onRelease) {
    let pressTimer = null;
    let pressStartTime = 0;
    let hasTriggered = false;
    let progressRing = null;
    
    // Criar indicador de progresso
    const indicator = document.createElement('div');
    indicator.className = 'progress-ring';
    indicator.innerHTML = '0%';
    element.style.position = 'relative';
    element.appendChild(indicator);
    
    function startPress(e) {
        e.preventDefault();
        pressStartTime = Date.now();
        hasTriggered = false;
        
        // Mostrar indicador de pressão
        const pressIndicator = document.getElementById('pressIndicator');
        pressIndicator.classList.add('show');
        
        // Iniciar animação do progresso
        let progress = 0;
        indicator.classList.add('show');
        
        pressTimer = setInterval(() => {
            const elapsed = Date.now() - pressStartTime;
            progress = Math.min(100, (elapsed / 800) * 100);
            indicator.innerHTML = `${Math.floor(progress)}%`;
            
            if (progress >= 100 && !hasTriggered) {
                clearInterval(pressTimer);
                hasTriggered = true;
                onLongPress(e);
                indicator.innerHTML = '✓';
                setTimeout(() => {
                    indicator.classList.remove('show');
                }, 500);
            }
        }, 16);
        
        // Efeito visual de pressão
        element.classList.add('press-effect');
    }
    
    function cancelPress() {
        if (pressTimer) {
            clearInterval(pressTimer);
            pressTimer = null;
        }
        indicator.classList.remove('show');
        indicator.innerHTML = '0%';
        element.classList.remove('press-effect');
        
        const pressIndicator = document.getElementById('pressIndicator');
        pressIndicator.classList.remove('show');
        
        if (!hasTriggered && onRelease) {
            onRelease();
        }
    }
    
    // Eventos para mouse e toque
    element.addEventListener('mousedown', startPress);
    element.addEventListener('mouseup', cancelPress);
    element.addEventListener('mouseleave', cancelPress);
    element.addEventListener('touchstart', startPress, { passive: false });
    element.addEventListener('touchend', cancelPress);
    element.addEventListener('touchcancel', cancelPress);
}

// ==================== INICIALIZAR AUDIO CONTEXT ====================
async function initAudioContext() {
    if (isAudioContextInitialized) return;
    
    audioContext = new (window.AudioContext || window.webkitAudioContext)();
    source = audioContext.createMediaElementSource(audio);
    
    const freqs = [60, 230, 910, 4000, 14000];
    filters = freqs.map(freq => {
        const filter = audioContext.createBiquadFilter();
        filter.type = 'peaking';
        filter.frequency.value = freq;
        filter.Q.value = 1;
        filter.gain.value = 0;
        return filter;
    });
    
    source.connect(filters[0]);
    for (let i = 0; i < filters.length - 1; i++) {
        filters[i].connect(filters[i + 1]);
    }
    filters[filters.length - 1].connect(audioContext.destination);
    
    if (state.visualizerActive) {
        initVisualizer();
    }
    
    isAudioContextInitialized = true;
}

// ==================== VISUALIZADOR DE ÁUDIO ====================
let analyser = null;
let animationId = null;

function initVisualizer() {
    if (!audioContext) return;
    
    analyser = audioContext.createAnalyser();
    analyser.fftSize = 256;
    const bufferLength = analyser.frequencyBinCount;
    const dataArray = new Uint8Array(bufferLength);
    
    filters[filters.length - 1].connect(analyser);
    analyser.connect(audioContext.destination);
    
    function draw() {
        if (!state.visualizerActive || !analyser) return;
        
        animationId = requestAnimationFrame(draw);
        analyser.getByteFrequencyData(dataArray);
        
        const bars = 20;
        const step = Math.floor(bufferLength / bars);
        elements.visualizer.innerHTML = '';
        
        for (let i = 0; i < bars; i++) {
            const value = dataArray[i * step] || 0;
            const height = (value / 255) * 40;
            const bar = document.createElement('div');
            bar.className = 'visualizer-bar';
            bar.style.height = `${Math.max(3, height)}px`;
            elements.visualizer.appendChild(bar);
        }
    }
    
    draw();
}

// ==================== SELEÇÃO DE PASTA INTEIRA COM PRESSÃO PROLONGADA ====================
async function selectFullFolder() {
    if (!window.showDirectoryPicker) {
        showToast('❌ Seu navegador não suporta seleção de pasta completa. Use Chrome/Edge');
        return;
    }
    
    try {
        showToast('📁 Selecionando pasta inteira...', 1000);
        const dirHandle = await window.showDirectoryPicker();
        await processFullDirectory(dirHandle);
        showToast('✅ Pasta inteira carregada com sucesso!');
    } catch (err) {
        if (err.name !== 'AbortError') {
            showToast('❌ Erro ao selecionar pasta');
        }
    }
}

async function processFullDirectory(dirHandle) {
    const audioExts = /\.(mp3|wav|m4a|ogg|flac|aac|wma|opus)$/i;
    const newSongs = [];
    let totalFiles = 0;
    
    async function processEntry(entry, path = '') {
        try {
            if (entry.kind === 'file') {
                totalFiles++;
                if (audioExts.test(entry.name)) {
                    const file = await entry.getFile();
                    const songId = path + entry.name;
                    const exists = state.songs.some(s => s.id === songId);
                    
                    if (!exists) {
                        newSongs.push({
                            file,
                            id: songId,
                            name: entry.name.replace(/\.[^/.]+$/, ""),
                            path: path + entry.name,
                            url: URL.createObjectURL(file)
                        });
                    }
                } else if (entry.name.endsWith('.lrc')) {
                    const file = await entry.getFile();
                    const text = await file.text();
                    const songName = entry.name.replace('.lrc', '');
                    state.lyrics[songName] = parseLRC(text);
                }
            } else if (entry.kind === 'directory') {
                for await (const child of entry.values()) {
                    await processEntry(child, path + entry.name + '/');
                }
            }
        } catch (e) {
            console.error('Erro ao processar:', e);
        }
    }
    
    for await (const entry of dirHandle.values()) {
        await processEntry(entry);
    }
    
    if (newSongs.length > 0) {
        const wasEmpty = state.songs.length === 0;
        state.songs.push(...newSongs);
        renderPlaylist();
        elements.folderInfo.innerHTML = `📁 ${dirHandle.name} • ${state.songs.length} músicas • ${totalFiles} arquivos encontrados`;
        elements.folderInfo.classList.add('show');
        showToast(`🎵 ${newSongs.length} músicas carregadas da pasta "${dirHandle.name}"`);
        if (wasEmpty && state.songs.length > 0) loadSong(0);
    } else {
        showToast(`📂 Nenhuma música encontrada na pasta "${dirHandle.name}"`);
    }
}

// ==================== EQUALIZADOR ====================
function updateEQ() {
    if (!filters.length) return;
    const eqValues = [
        parseFloat(document.getElementById('eq-60').value),
        parseFloat(document.getElementById('eq-230').value),
        parseFloat(document.getElementById('eq-910').value),
        parseFloat(document.getElementById('eq-4000').value),
        parseFloat(document.getElementById('eq-14000').value)
    ];
    
    filters.forEach((filter, idx) => {
        filter.gain.value = eqValues[idx];
    });
}

function applyEQPreset(preset) {
    const values = state.eqPresets[preset];
    if (!values) return;
    
    const eqInputs = ['eq-60', 'eq-230', 'eq-910', 'eq-4000', 'eq-14000'];
    eqInputs.forEach((id, idx) => {
        const input = document.getElementById(id);
        if (input) {
            input.value = values[idx];
        }
    });
    updateEQ();
    
    document.querySelectorAll('.preset-btn').forEach(btn => {
        btn.classList.toggle('active', btn.dataset.preset === preset);
    });
}

// ==================== LETRAS (LRC) ====================
function parseLRC(text) {
    const lines = text.split('\n');
    const result = [];
    const timeRegex = /\[(\d{2}):(\d{2})\.(\d{2,3})\]/;
    
    lines.forEach(line => {
        let match = line.match(timeRegex);
        if (match) {
            const minutes = parseInt(match[1]);
            const seconds = parseInt(match[2]);
            const milliseconds = parseInt(match[3]);
            const time = minutes * 60 + seconds + milliseconds / 1000;
            const text = line.replace(/\[\d{2}:\d{2}\.\d{2,3}\]/g, '').trim();
            if (text) result.push({ time, text });
        }
    });
    
    return result.sort((a, b) => a.time - b.time);
}

// ==================== PLAYER CONTROLES ====================
function loadSong(index) {
    if (state.songs.length === 0) return;
    
    state.currentIndex = Math.max(0, Math.min(index, state.songs.length - 1));
    const song = state.songs[state.currentIndex];
    
    if (audio.src) {
        URL.revokeObjectURL(audio.src);
    }
    
    audio.src = song.url;
    elements.titleEl.textContent = song.name;
    elements.artistEl.textContent = song.path.split('/').slice(0, -1).join('/') || "Arquivo local";
    
    state.currentLyrics = state.lyrics[song.name] || [];
    elements.lyricsBox.classList.toggle('active', state.currentLyrics.length > 0);
    
    showQualityBadge(song.file);
    updateArtwork(song);
    renderPlaylist();
    playSong();
}

function showQualityBadge(file) {
    if (!file) return;
    const bitrate = file.size / (audio.duration || 180);
    let quality = '🎵 MP3';
    if (bitrate > 320) quality = '💎 FLAC';
    else if (bitrate > 192) quality = '✨ HD';
    
    elements.qualityBadge.textContent = quality;
    elements.qualityBadge.classList.add('show');
    setTimeout(() => elements.qualityBadge.classList.remove('show'), 2000);
}

function updateArtwork(song) {
    const canvas = document.createElement('canvas');
    canvas.width = 300;
    canvas.height = 300;
    const ctx = canvas.getContext('2d');
    
    const gradient = ctx.createLinearGradient(0, 0, canvas.width, canvas.height);
    gradient.addColorStop(0, `#${Math.floor(Math.random()*16777215).toString(16)}`);
    gradient.addColorStop(1, `#${Math.floor(Math.random()*16777215).toString(16)}`);
    ctx.fillStyle = gradient;
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    
    ctx.fillStyle = 'white';
    ctx.font = 'bold 120px Arial';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText('🎵', canvas.width/2, canvas.height/2);
    
    elements.cover.innerHTML = '';
    elements.cover.appendChild(canvas);
}

function playSong() {
    initAudioContext().then(() => {
        audio.play();
        elements.playIcon.innerHTML = '<path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/>';
        if (audioContext && audioContext.state === 'suspended') {
            audioContext.resume();
        }
    });
}

function pauseSong() {
    audio.pause();
    elements.playIcon.innerHTML = '<path d="M8 5v14l11-7z"/>';
}

function nextSong() {
    if (state.isShuffle) {
        const newIndex = Math.floor(Math.random() * state.songs.length);
        loadSong(newIndex);
    } else {
        const nextIndex = (state.currentIndex + 1) % state.songs.length;
        loadSong(nextIndex);
    }
}

function prevSong() {
    if (audio.currentTime > 3) {
        audio.currentTime = 0;
    } else {
        const prevIndex = state.currentIndex > 0 ? state.currentIndex - 1 : state.songs.length - 1;
        loadSong(prevIndex);
    }
}

// ==================== PLAYLIST ====================
function renderPlaylist() {
    if (state.songs.length === 0) {
        elements.playlistItems.innerHTML = '<div class="empty">🎵 Nenhuma música carregada</div>';
        return;
    }
    
    elements.playlistItems.innerHTML = state.songs.map((song, i) => `
        <div class="playlist-item ${i === state.currentIndex ? 'active' : ''}" data-index="${i}">
            <span class="num">${(i + 1).toString().padStart(2, '0')}</span>
            <div class="info">
                <div class="title">${escapeHtml(song.name)}</div>
                <div class="path">${escapeHtml(song.path)}</div>
            </div>
        </div>
    `).join('');
    
    document.querySelectorAll('.playlist-item').forEach(item => {
        item.addEventListener('click', () => loadSong(parseInt(item.dataset.index)));
    });
}

function escapeHtml(text) {
    const div = document.createElement('div');
    div.textContent = text;
    return div.innerHTML;
}

// ==================== PROCESSAR ARQUIVOS ====================
async function processFiles(files, isFolder = false) {
    const audioExts = /\.(mp3|wav|m4a|ogg|flac|aac|wma|opus)$/i;
    const audioFiles = files.filter(f => audioExts.test(f.name));
    const lrcFiles = files.filter(f => f.name.endsWith('.lrc'));
    
    for (const lrcFile of lrcFiles) {
        try {
            const text = await lrcFile.text();
            const songName = lrcFile.name.replace(/\.lrc$/i, '');
            state.lyrics[songName] = parseLRC(text);
        } catch (e) {
            console.error('Erro ao carregar letra:', e);
        }
    }
    
    const oldLength = state.songs.length;
    const newSongs = [];
    
    for (const file of audioFiles) {
        const songId = file.webkitRelativePath || file.name;
        const exists = state.songs.some(s => (s.file.webkitRelativePath || s.file.name) === songId);
        
        if (!exists) {
            newSongs.push({
                file,
                id: songId,
                name: file.name.replace(/\.[^/.]+$/, ""),
                path: file.webkitRelativePath || file.name,
                url: URL.createObjectURL(file)
            });
        }
    }
    
    state.songs.push(...newSongs);
    
    if (newSongs.length > 0) {
        showToast(`✅ ${newSongs.length} música${newSongs.length > 1 ? 's' : ''} adicionada${newSongs.length > 1 ? 's' : ''}`);
        
        if (isFolder && newSongs.length > 0) {
            const folderName = audioFiles[0]?.webkitRelativePath?.split('/')[0] || 'Pasta';
            elements.folderInfo.innerHTML = `📁 ${folderName} • ${state.songs.length} músicas`;
            elements.folderInfo.classList.add('show');
        }
        
        renderPlaylist();
        if (oldLength === 0) loadSong(0);
    }
}

// ==================== AUTO SCAN ====================
async function scanDirectory(dirHandle) {
    const audioExts = /\.(mp3|wav|m4a|ogg|flac|aac|wma|opus)$/i;
    const newSongs = [];
    
    async function processEntry(entry, path = '') {
        try {
            if (entry.kind === 'file') {
                const file = await entry.getFile();
                if (audioExts.test(file.name)) {
                    const songId = path + file.name;
                    const exists = state.songs.some(s => s.id === songId);
                    
                    if (!exists) {
                        newSongs.push({
                            file,
                            id: songId,
                            name: file.name.replace(/\.[^/.]+$/, ""),
                            path: path + file.name,
                            url: URL.createObjectURL(file)
                        });
                    }
                } else if (file.name.endsWith('.lrc')) {
                    const text = await file.text();
                    const songName = file.name.replace('.lrc', '');
                    state.lyrics[songName] = parseLRC(text);
                }
            } else if (entry.kind === 'directory') {
                for await (const child of entry.values()) {
                    await processEntry(child, path + entry.name + '/');
                }
            }
        } catch (e) {
            console.error('Erro ao processar:', e);
        }
    }
    
    for await (const entry of dirHandle.values()) {
        await processEntry(entry);
    }
    
    if (newSongs.length > 0) {
        const wasEmpty = state.songs.length === 0;
        state.songs.push(...newSongs);
        renderPlaylist();
        elements.folderInfo.innerHTML = `📁 ${dirHandle.name} • ${state.songs.length} músicas • Auto Scan 🔄`;
        elements.folderInfo.classList.add('show');
        showToast(`🔍 ${newSongs.length} nova${newSongs.length > 1 ? 's' : ''} música${newSongs.length > 1 ? 's' : ''} encontrada${newSongs.length > 1 ? 's' : ''}`);
        if (wasEmpty && state.songs.length > 0) loadSong(0);
    }
}

async function saveDirectoryHandle(handle) {
    try {
        const db = await new Promise((resolve, reject) => {
            const request = indexedDB.open('BenMusicDB', 1);
            request.onerror = () => reject(request.error);
            request.onsuccess = () => resolve(request.result);
            request.onupgradeneeded = () => {
                request.result.createObjectStore('handles');
            };
        });
        
        const tx = db.transaction('handles', 'readwrite');
        tx.objectStore('handles').put(handle, 'musicFolder');
        await tx.done;
    } catch (e) {
        console.error('Erro ao salvar handle:', e);
    }
}

setupLongPress(elements.folderLoadBtn,

elements.folderInput.addEventListener('change', async (e) => {

elements.autoScanBtn.addEventListener('click', async () => {
    if (!window.showDirectoryPicker) {
        showToast('❌ Seu navegador não suporta Auto Scan. Use Chrome/Edge');
        return;
    }
    
    try {
        const dirHandle = await window.showDirectoryPicker();
        state.dirHandle = dirHandle;
        await scanDirectory(dirHandle);
        await saveDirectoryHandle(dirHandle);

        elements.autoScanBtn.classList.add('active');
        elements.autoScanBtn.innerHTML = '✅ Auto Scan Ativo';
        showToast('📁 Pasta monitorada com sucesso!');
    } catch (err) {
        if (err.name !== 'AbortError') {
            showToast('❌ Erro ao acessar pasta');
        }
    }
});

elements.playBtn.addEventListener('click', () => {
    audio.paused ? playSong() : pauseSong();
});

elements.nextBtn.addEventListener('click', nextSong);
elements.prevBtn.addEventListener('click', prevSong);

elements.shuffleBtn.addEventListener('click', () => {
    state.isShuffle = !state.isShuffle;
    elements.shuffleBtn.classList.toggle('active', state.isShuffle);
    showToast(state.isShuffle ? '🔀 Aleatório ativado' : '➡️ Aleatório desativado');
});

elements.repeatBtn.addEventListener('click', () => {
    state.isRepeat = !state.isRepeat;
    audio.loop = state.isRepeat;
    elements.repeatBtn.classList.toggle('active', state.isRepeat);
    showToast(state.isRepeat ? '🔁 Repetição ativada' : '⏹️ Repetição desativada');
});

elements.volumeSlider.addEventListener('input', (e) => {
    audio.volume = parseFloat(e.target.value);
});

elements.progressBar.addEventListener('click', (e) => {
    if (audio.duration) {
        const rect = elements.progressBar.getBoundingClientRect();
        const percent = (e.clientX - rect.left) / rect.width;
        audio.currentTime = percent * audio.duration;
    }
});

audio.addEventListener('timeupdate', () => {
    if (audio.duration) {
        const percent = (audio.currentTime / audio.duration) * 100;
        elements.progress.style.width = `${percent}%`;
        elements.currentTimeEl.textContent = formatTime(audio.currentTime);
        elements.totalTimeEl.textContent = formatTime(audio.duration);
        
        if (state.currentLyrics.length > 0) {
            const currentLine = state.currentLyrics.findLast(l => l.time <= audio.currentTime);
            if (currentLine) {
                elements.lyricsBox.textContent = currentLine.text;
            }
        }
    }
});

audio.addEventListener('ended', () => {
    if (state.isRepeat) {
        audio.currentTime = 0;
        playSong();
    } else if (!state.isShuffle && state.currentIndex + 1 < state.songs.length) {
        nextSong();
    } else if (state.isShuffle) {
        nextSong();
    } else {
        pauseSong();
        audio.currentTime = 0;
        elements.progress.style.width = '0%';
    }
});

document.querySelectorAll('.eq-band input').forEach(input => {
    input.addEventListener('input', updateEQ);
});

document.querySelectorAll('.preset-btn').forEach(btn => {
    btn.addEventListener('click', () => {
        applyEQPreset(btn.dataset.preset);
    });
});

const savedTheme = localStorage.getItem('theme') || 
    (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
document.documentElement.setAttribute('data-theme', savedTheme);

elements.themeToggle.addEventListener('click', () => {
    const current = document.documentElement.getAttribute('data-theme');
    const newTheme = current === 'dark' ? 'light' : 'dark';
    document.documentElement.setAttribute('data-theme', newTheme);
    localStorage.setItem('theme', newTheme);
});

document.querySelectorAll('.tab').forEach(tab => {
    tab.addEventListener('click', () => {
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
        tab.classList.add('active');
        document.getElementById(`${tab.dataset.tab}-tab`).classList.add('active');
    });
});

window.addEventListener('DOMContentLoaded', async () => {
    if (!window.showDirectoryPicker) return;
    try {
        const db = await new Promise((resolve, reject) => {
            const request = indexedDB.open('BenMusicDB', 1);
            request.onerror = () => reject(request.error);
            request.onsuccess = () => resolve(request.result);
        });
        
        const tx = db.transaction('handles', 'readonly');
        const savedHandle = await tx.objectStore('handles').get('musicFolder');
        
        if (savedHandle) {
            const permission = await savedHandle.queryPermission({ mode: 'read' });
            if (permission === 'granted') {
                state.dirHandle = savedHandle;
                await scanDirectory(savedHandle);
                state.autoScanActive = true;
                elements.autoScanBtn.classList.add('active');
                elements.autoScanBtn.innerHTML = '✅ Auto Scan Ativo';
            }
        }
    } catch (err) {
        console.log('Auto scan não configurado');
    }
});

applyEQPreset('flat');
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Ben Music Pro</title>
    <style>
        :root {
            --bg: #050505;
            --card: #121212;
            --primary: #7c3aed;
            --text: #ffffff;
            --text-dim: #888888;
            --accent: #22c55e;
            --danger: #ef4444;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: -apple-system, system-ui, sans-serif;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* Splash Screen */
        #splash {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; z-index: 10000;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }

        .ignis-box {
            border: 2px solid #ff4600;
            padding: 30px;
            border-radius: 25px;
            text-align: center;
            box-shadow: 0 0 40px rgba(255, 70, 0, 0.2);
        }

        /* Container Principal */
        .app-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            padding: 20px;
            max-width: 500px;
            margin: 0 auto;
            width: 100%;
            gap: 15px;
        }

        .player-main {
            background: linear-gradient(180deg, #1a1a1a 0%, #0a0a0a 100%);
            border-radius: 35px;
            padding: 30px;
            text-align: center;
            border: 1px solid #222;
        }

        .album-cover {
            width: 150px; height: 150px;
            background: linear-gradient(135deg, var(--primary), #3b0764);
            margin: 0 auto 20px;
            border-radius: 30px;
            display: flex; align-items: center; justify-content: center;
            font-size: 60px;
            box-shadow: 0 15px 30px rgba(0,0,0,0.5);
        }

        /* Playlist */
        .playlist-card {
            flex: 1;
            background: var(--card);
            border-radius: 30px;
            border: 1px solid #222;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .playlist-header {
            padding: 20px;
            border-bottom: 1px solid #222;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .track-list {
            flex: 1;
            overflow-y: auto;
        }

        .track-item {
            padding: 15px 20px;
            border-bottom: 1px solid #1a1a1a;
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .track-item.active {
            background: rgba(124, 58, 237, 0.1);
            border-left: 4px solid var(--primary);
        }

        /* Controls */
        .progress-container {
            width: 100%; height: 6px; background: #333;
            border-radius: 10px; margin: 20px 0 10px; overflow: hidden;
        }
        .progress-bar { width: 0%; height: 100%; background: var(--primary); }

        .controls { display: flex; align-items: center; justify-content: center; gap: 30px; }
        .btn-play {
            width: 65px; height: 65px; background: var(--primary);
            border-radius: 50%; border: none; color: white; font-size: 25px;
        }

        .btn-add {
            background: var(--accent); color: white; border: none;
            padding: 18px; border-radius: 20px; font-weight: bold; width: 100%;
            box-shadow: 0 5px 15px rgba(34, 197, 94, 0.2);
        }

        .empty-msg { text-align: center; color: #555; padding: 40px; font-size: 14px; }
    </style>
</head>
<body>

<div id="splash">
    <div class="ignis-box">
        <h1 style="color: #ff4600; letter-spacing: 5px;">✦ IGNIS ✦</h1>
        <p style="color: #fff; font-size: 12px; margin-top: 5px;">VANDENSON LIMA PINHEIRO</p>
        <p id="db-status" style="color: #555; font-size: 10px; margin-top: 15px;">Iniciando banco de dados...</p>
    </div>
</div>

<div class="app-container">
    <div class="player-main">
        <div class="album-cover" id="cover">🎵</div>
        <h2 id="now-title" style="font-size: 1.2rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;">Ben Music Pro</h2>
        <p id="now-artist" style="color: var(--text-dim); font-size: 0.8rem; margin-top: 5px;">Biblioteca Permanente</p>

        <div class="progress-container"><div class="progress-bar" id="progress"></div></div>
        
        <div class="controls">
            <button style="background:none; border:none; color:white; font-size:25px;" onclick="player.prev()">⏮</button>
            <button class="btn-play" id="play-pause" onclick="player.toggle()">▶</button>
            <button style="background:none; border:none; color:white; font-size:25px;" onclick="player.next()">⏭</button>
        </div>
    </div>

    <button class="btn-add" onclick="document.getElementById('input-file').click()">➕ ADICIONAR NOVAS MÚSICAS</button>
    <input type="file" id="input-file" multiple accept="audio/*" style="display: none;">

    <div class="playlist-card">
        <div class="playlist-header">
            <span style="font-weight: bold;">Sua Galeria</span>
            <span id="count" style="color: var(--text-dim); font-size: 12px;">0 músicas</span>
        </div>
        <div class="track-list" id="list">
            <!-- Músicas aparecerão aqui -->
        </div>
        <button onclick="player.clearDB()" style="background:none; border:none; color:var(--danger); padding:10px; font-size:10px; opacity:0.5;">APAGAR TODA MEMÓRIA</button>
    </div>
</div>

<audio id="audio-engine"></audio>

<script>
// Configuração do Banco de Dados Permanente
const DB_NAME = "BenMusicPro_DB";
const STORE_NAME = "library";

const player = {
    db: null,
    songs: [],
    current: -1,
    audio: document.getElementById('audio-engine'),

    async init() {
        // 1. Tentar tornar o armazenamento persistente (Importante para Android)
        if (navigator.storage && navigator.storage.persist) {
            await navigator.storage.persist();
        }

        // 2. Abrir Banco de Dados
        const request = indexedDB.open(DB_NAME, 3);
        
        request.onupgradeneeded = (e) => {
            let db = e.target.result;
            if (!db.objectStoreNames.contains(STORE_NAME)) {
                db.createObjectStore(STORE_NAME, { keyPath: "id", autoIncrement: true });
            }
        };

        request.onsuccess = (e) => {
            this.db = e.target.result;
            this.loadSongs();
            document.getElementById('db-status').innerText = "Memória carregada!";
            setTimeout(() => {
                document.getElementById('splash').style.display = 'none';
            }, 1500);
        };

        // Eventos de Áudio
        this.audio.ontimeupdate = () => {
            const p = (this.audio.currentTime / this.audio.duration) * 100;
            document.getElementById('progress').style.width = p + '%';
        };
        this.audio.onended = () => this.next();

        document.getElementById('input-file').onchange = (e) => this.saveSongs(e.target.files);
    },

    async saveSongs(files) {
        if (!files.length) return;
        
        const tx = this.db.transaction(STORE_NAME, "readwrite");
        const store = tx.objectStore(STORE_NAME);

        for (let file of files) {
            const song = {
                title: file.name.replace(/\.[^/.]+$/, "").replace(/_/g, " "),
                data: file // O arquivo MP3 é salvo como Blob
            };
            store.add(song);
        }

        tx.oncomplete = () => this.loadSongs();
    },

    loadSongs() {
        const tx = this.db.transaction(STORE_NAME, "readonly");
        const store = tx.objectStore(STORE_NAME);
        const request = store.getAll();

        request.onsuccess = () => {
            this.songs = request.result;
            this.render();
        };
    },

    render() {
        const listDiv = document.getElementById('list');
        const countSpan = document.getElementById('count');
        listDiv.innerHTML = '';
        countSpan.innerText = `${this.songs.length} músicas`;

        if (this.songs.length === 0) {
            listDiv.innerHTML = '<div class="empty-msg">Nenhuma música na memória.<br>Adicione músicas clicando no botão verde.</div>';
            return;
        }

        this.songs.forEach((song, i) => {
            const item = document.createElement('div');
            item.className = `track-item ${this.current === i ? 'active' : ''}`;
            item.innerHTML = `
                <div style="font-size: 20px;">${this.current === i ? '🔊' : '🎵'}</div>
                <div style="flex:1; overflow:hidden;">
                    <div style="font-weight:600; font-size:14px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;">${song.title}</div>
                    <div style="font-size:10px; color:#555;">Salvo no Dispositivo</div>
                </div>
            `;
            item.onclick = () => this.play(i);
            listDiv.appendChild(item);
        });
    },

    play(i) {
        this.current = i;
        const song = this.songs[i];
        
        if (this.audio.src) URL.revokeObjectURL(this.audio.src);
        this.audio.src = URL.createObjectURL(song.data);
        
        this.audio.play();
        document.getElementById('play-pause').innerText = '⏸';
        document.getElementById('now-title').innerText = song.title;
        document.getElementById('cover').innerHTML = '💿';
        this.render();
    },

    toggle() {
        if (this.current === -1 && this.songs.length > 0) return this.play(0);
        if (this.songs.length === 0) return;

        if (this.audio.paused) {
            this.audio.play();
            document.getElementById('play-pause').innerText = '⏸';
        } else {
            this.audio.pause();
            document.getElementById('play-pause').innerText = '▶';
        }
    },

    next() {
        let n = this.current + 1;
        if (n >= this.songs.length) n = 0;
        this.play(n);
    },

    prev() {
        let p = this.current - 1;
        if (p < 0) p = this.songs.length - 1;
        this.play(p);
    },

    clearDB() {
        if (confirm("Isso apagará todas as músicas da memória do app. Continuar?")) {
            const tx = this.db.transaction(STORE_NAME, "readwrite");
            tx.objectStore(STORE_NAME).clear();
            tx.oncomplete = () => location.reload();
        }
    }
};

player.init();
</script>

</body>
</html>

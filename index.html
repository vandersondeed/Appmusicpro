<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Ben Music Pro - Player Avançado</title>
<meta name="theme-color" content="#7c3aed">
<style>
/* ... (Mantendo os estilos originais do seu ficheiro) ... */
* { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
:root { --bg: #0f0f14; --card: #1a1a22; --primary: #7c3aed; --primary-dark: #6d28d9; --primary-glow: #a78bfa; --text: #e5e7eb; --text-muted: #9ca3af; --border: #2d2d3a; --success: #10b981; --error: #ef4444; --warning: #f59e0b; --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
body { background: var(--bg); color: var(--text); min-height: 100vh; display: flex; justify-content: center; padding: 16px; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; }
.app { width: 100%; max-width: 550px; display: flex; flex-direction: column; gap: 20px; }
.player-card { background: var(--card); border: 1px solid var(--border); border-radius: 28px; padding: 24px; box-shadow: 0 8px 32px rgba(0,0,0,0.2); }
.btn-main { width: 100%; background: var(--primary); color: white; border: none; padding: 18px; border-radius: 16px; font-weight: 800; cursor: pointer; margin-top: 10px; transition: var(--transition); }
.btn-main:hover { background: var(--primary-dark); transform: scale(0.98); }
.btn-secondary { background: var(--success); }
.playlist { background: var(--card); border: 1px solid var(--border); border-radius: 20px; padding: 8px; max-height: 300px; overflow-y: auto; margin-top: 10px; }
.track { padding: 12px; border-bottom: 1px solid var(--border); font-size: 13px; cursor: pointer; transition: var(--transition); }
.track:hover { background: rgba(124, 58, 237, 0.1); }
.track.active { background: rgba(124, 58, 237, 0.15); border-left: 3px solid var(--primary); }
.progress-bar { width: 100%; height: 4px; background: var(--border); border-radius: 2px; margin-top: 10px; overflow: hidden; }
.progress-fill { height: 100%; background: var(--primary); width: 0%; transition: width 0.3s; }
.status-text { font-size: 11px; color: var(--text-muted); margin-top: 8px; }
</style>
</head>
<body>

<div id="flameNeonPopup" style="position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 20000; display: flex; align-items: center; justify-content: center; cursor: pointer;">
    <div style="background: #0a0a0c; border-radius: 40px; padding: 2rem; text-align: center; border: 2px solid #ff4600;">
        <div style="font-size: 2rem; font-weight: 900; color: #ff7300;">✦ IGNIS ✦</div>
        <div style="color: #fff; font-weight: 800;">VANDENSON LIMA PINHEIRO</div>
    </div>
</div>

<div class="app">
    <div class="player-card">
        <h2 id="title">Ben Music Pro</h2>
        <p id="status" style="color: var(--text-muted); font-size: 12px;">Aguardando permissão...</p>
        <div class="progress-bar">
            <div class="progress-fill" id="progressFill"></div>
        </div>
        <p id="scanStatus" class="status-text"></p>
        <audio id="audio" style="width: 100%; margin-top: 20px;" controls></audio>
    </div>

    <button id="scanBtn" class="btn-main">🔍 ESCANEAR MEMÓRIA ANDROID</button>
    
    <div class="playlist" id="playlist">
        <div style="text-align:center; padding:20px; color:gray;">Nenhuma música carregada</div>
    </div>
</div>

<script>
const playerApp = {
    audio: document.getElementById('audio'),
    songs: [],
    db: null,
    isScanning: false,

    async init() {
        this.db = await this.openDB();
        document.getElementById('scanBtn').onclick = () => this.requestPermission();
        this.checkPreviousPermission();
        
        // Mantendo o pop-up original - esconde após 3 segundos
        setTimeout(() => document.getElementById('flameNeonPopup').style.display = 'none', 3000);
    },

    openDB() {
        return new Promise((resolve) => {
            const request = indexedDB.open("BenMusicDB", 1);
            request.onupgradeneeded = (e) => e.target.result.createObjectStore("settings");
            request.onsuccess = (e) => resolve(e.target.result);
        });
    },

    async requestPermission() {
        try {
            if (!window.showDirectoryPicker) {
                alert("O seu navegador não suporta a varredura de pastas. Use o Chrome no Android.");
                return;
            }

            // Solicita acesso à pasta raiz para escaneamento completo
            const dirHandle = await window.showDirectoryPicker();
            
            const tx = this.db.transaction("settings", "readwrite");
            await tx.objectStore("settings").put(dirHandle, "lastFolder");
            
            await this.fullScan(dirHandle);
        } catch (err) {
            console.error(err);
            alert("É necessário conceder permissão à pasta para listar as músicas.");
        }
    },

    async checkPreviousPermission() {
        const tx = this.db.transaction("settings", "readonly");
        const handle = await tx.objectStore("settings").get("lastFolder");
        
        if (handle) {
            const status = await handle.queryPermission();
            if (status === 'granted') {
                this.fullScan(handle);
            } else {
                document.getElementById('status').innerText = "Toque no botão para reativar o acesso.";
            }
        }
    },

    async fullScan(handle) {
        if (this.isScanning) return;
        this.isScanning = true;
        
        document.getElementById('status').innerText = "🔍 ESCANEANDO COMPLETO DA MEMÓRIA...";
        document.getElementById('scanStatus').innerText = "Iniciando varredura em todas as pastas...";
        document.getElementById('progressFill').style.width = '0%';
        
        this.songs = [];
        const playlistDiv = document.getElementById('playlist');
        playlistDiv.innerHTML = '<div style="text-align:center; padding:20px; color:#a78bfa;">🔍 Escaneando toda a memória em busca de MP3... Aguarde 🔍</div>';
        
        let totalFilesChecked = 0;
        let mp3FilesFound = 0;
        let foldersScanned = 0;
        
        // Pastas para ignorar (sistema e apps)
        const ignoreFolders = [
            'Android', 'data', 'obb', 'cache', 'tmp', 'temp', 
            'system', 'sys', 'proc', 'dev', 'root', 'lost+found',
            '.thumbnails', '.trash', '.cache', '.tmp', 'com.android',
            'com.google', 'com.whatsapp', 'com.facebook', 'com.instagram'
        ];

        const recursiveFullScan = async (dirHandle, depth = 0) => {
            // Limite de profundidade para evitar loops infinitos
            if (depth > 15) return;
            
            try {
                const permission = await dirHandle.queryPermission();
                if (permission !== 'granted') return;
                
                for await (const entry of dirHandle.values()) {
                    if (entry.kind === 'file') {
                        totalFilesChecked++;
                        
                        // Verifica se é arquivo MP3 (mais comum)
                        const fileName = entry.name;
                        if (/\.(mp3|MP3|wav|WAV|ogg|OGG|m4a|M4A|flac|FLAC)$/i.test(fileName)) {
                            try {
                                const file = await entry.getFile();
                                if (file.size > 0 && file.size < 50 * 1024 * 1024) { // Até 50MB
                                    this.songs.push({ 
                                        name: fileName, 
                                        data: file,
                                        size: file.size,
                                        path: entry.name
                                    });
                                    mp3FilesFound++;
                                    
                                    // Atualiza UI a cada 10 músicas encontradas
                                    if (mp3FilesFound % 10 === 0) {
                                        document.getElementById('status').innerText = `📀 Encontradas ${mp3FilesFound} músicas MP3...`;
                                        document.getElementById('scanStatus').innerText = `Verificados ${totalFilesChecked} arquivos | ${foldersScanned} pastas`;
                                    }
                                }
                            } catch (fileErr) {
                                console.warn("Erro ao ler arquivo:", fileName);
                            }
                        }
                        
                        // Atualiza progresso visual a cada 1000 arquivos
                        if (totalFilesChecked % 1000 === 0) {
                            const progress = Math.min((totalFilesChecked / 10000) * 100, 90);
                            document.getElementById('progressFill').style.width = `${progress}%`;
                        }
                        
                    } else if (entry.kind === 'directory') {
                        const dirName = entry.name;
                        // Pula pastas do sistema e temporárias
                        if (!ignoreFolders.some(ignore => dirName === ignore || dirName.startsWith('.'))) {
                            foldersScanned++;
                            await recursiveFullScan(entry, depth + 1);
                        }
                    }
                }
            } catch (err) {
                console.warn("Erro ao acessar pasta:", err);
            }
        };

        try {
            await recursiveFullScan(handle);
            
            document.getElementById('progressFill').style.width = '100%';
            document.getElementById('status').innerText = `✅ ESCANEAMENTO COMPLETO! ${this.songs.length} músicas encontradas!`;
            document.getElementById('scanStatus').innerText = `Varredura finalizada: ${totalFilesChecked} arquivos verificados em ${foldersScanned} pastas`;
            
            if (this.songs.length === 0) {
                playlistDiv.innerHTML = '<div style="text-align:center; padding:20px; color:#ffaa44;">⚠️ Nenhum arquivo MP3 encontrado! Verifique se há músicas na memória do dispositivo. ⚠️</div>';
            } else {
                // Ordena por nome da música
                this.songs.sort((a, b) => a.name.localeCompare(b.name));
                playlistDiv.innerHTML = "";
                
                // Adiciona estatísticas no topo
                const statsDiv = document.createElement('div');
                statsDiv.style.padding = '12px';
                statsDiv.style.background = 'rgba(124, 58, 237, 0.1)';
                statsDiv.style.borderRadius = '12px';
                statsDiv.style.marginBottom = '12px';
                statsDiv.style.fontSize = '12px';
                statsDiv.innerHTML = `📊 Total: ${this.songs.length} músicas | 🎵 ${Math.round(this.songs.length / 10 * 10)} minutos de música`;
                playlistDiv.appendChild(statsDiv);
                
                // Adiciona músicas encontradas
                this.songs.forEach((song, idx) => this.addTrackToUI(song.name, idx));
            }
            
        } catch (scanErr) {
            console.error("Erro durante escaneamento completo:", scanErr);
            playlistDiv.innerHTML = '<div style="text-align:center; padding:20px; color:red;">❌ Erro ao escanear toda memória. Tente novamente selecionando uma pasta específica.</div>';
            document.getElementById('status').innerText = "❌ Falha na varredura completa.";
        } finally {
            this.isScanning = false;
        }
    },

    addTrackToUI(name, index) {
        const div = document.createElement('div');
        div.className = 'track';
        
        // Simplifica o nome para exibição
        let displayName = name;
        if (name.length > 50) {
            displayName = name.substring(0, 47) + "...";
        }
        
        div.innerText = `${index + 1}. ${displayName}`;
        div.title = `🎵 ${name}${this.songs[index].size ? ` (${Math.round(this.songs[index].size / 1024)} KB)` : ''}`;
        
        div.onclick = () => {
            try {
                // Limpa URL anterior
                if (this.audio.src) {
                    URL.revokeObjectURL(this.audio.src);
                }
                
                // Cria nova URL para o arquivo MP3
                const songData = this.songs[index].data;
                this.audio.src = URL.createObjectURL(songData);
                this.audio.play().catch(e => console.log("Autoplay bloqueado:", e));
                
                // Atualiza título
                const cleanName = name.replace(/\.(mp3|wav|ogg|m4a|flac)$/i, '');
                document.getElementById('title').innerHTML = `🎵 ${cleanName.length > 40 ? cleanName.substring(0, 37) + '...' : cleanName}`;
                
                // Marca como ativo
                document.querySelectorAll('.track').forEach(t => t.classList.remove('active'));
                div.classList.add('active');
                
                // Mostra status
                document.getElementById('status').innerText = `🎧 Tocando: ${cleanName}`;
                
                // Limpa URL quando a música terminar
                this.audio.onended = () => {
                    if (this.audio.src) {
                        URL.revokeObjectURL(this.audio.src);
                    }
                };
                
            } catch (err) {
                console.error("Erro ao reproduzir:", err);
                document.getElementById('status').innerText = "❌ Erro ao reproduzir esta música";
            }
        };
        
        document.getElementById('playlist').appendChild(div);
    },
    
    // Função para limpar cache quando necessário
    clearCache() {
        this.songs = [];
        document.getElementById('playlist').innerHTML = '<div style="text-align:center; padding:20px; color:gray;">Cache limpo. Toque em ESCANEAR novamente.</div>';
        if (this.audio.src) {
            URL.revokeObjectURL(this.audio.src);
            this.audio.src = "";
        }
        document.getElementById('title').innerText = "Ben Music Pro";
        document.getElementById('status').innerText = "Cache limpo. Pressione ESCANEAR para nova varredura.";
        document.getElementById('progressFill').style.width = '0%';
        document.getElementById('scanStatus').innerText = "";
    }
};

playerApp.init();
</script>
</body>
</html>

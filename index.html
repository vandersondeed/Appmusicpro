<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Ben Music Pro</title>
<style>
:root {
    --bg: #0d0d12;
    --card: #1a1a24;
    --primary: #8b5cf6;
    --text: #ffffff;
    --text-dim: #9ca3af;
    --border: #2d2d3f;
    --accent: #10b981;
}

* { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

body { 
    background: var(--bg); 
    color: var(--text); 
    font-family: 'Segoe UI', system-ui, sans-serif;
    height: 100vh;
    display: flex;
    flex-direction: column;
}

/* Splash Screen */
#splash {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    background: #000; z-index: 9999;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    transition: opacity 0.5s ease;
}

.main-container {
    flex: 1;
    display: flex;
    flex-direction: column;
    padding: 15px;
    gap: 15px;
    max-width: 500px;
    margin: 0 auto;
    width: 100%;
}

/* Card Principal */
.player-card {
    background: var(--card);
    border-radius: 24px;
    padding: 20px;
    text-align: center;
    border: 1px solid var(--border);
    box-shadow: 0 10px 30px rgba(0,0,0,0.4);
}

.track-info h2 {
    font-size: 1.2rem;
    margin: 10px 0 5px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
}

.track-info p {
    color: var(--text-dim);
    font-size: 0.85rem;
    margin-bottom: 15px;
}

/* Progress Bar */
.progress-container {
    width: 100%;
    height: 6px;
    background: var(--border);
    border-radius: 10px;
    margin: 15px 0;
    cursor: pointer;
    position: relative;
}

.progress-bar {
    height: 100%;
    background: var(--primary);
    border-radius: 10px;
    width: 0%;
}

/* Controls */
.controls {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 25px;
    margin: 10px 0;
}

.btn-icon {
    background: none;
    border: none;
    color: white;
    font-size: 24px;
    cursor: pointer;
}

.btn-play {
    width: 60px;
    height: 60px;
    background: var(--primary);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 28px;
    box-shadow: 0 4px 15px rgba(139, 92, 246, 0.4);
}

/* List Area */
.list-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-top: 10px;
}

.search-box {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 12px;
    color: white;
    width: 100%;
    margin: 10px 0;
}

.playlist {
    flex: 1;
    overflow-y: auto;
    background: var(--card);
    border-radius: 20px;
    border: 1px solid var(--border);
}

.track-item {
    padding: 12px 15px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 12px;
}

.track-item.active {
    background: rgba(139, 92, 246, 0.1);
    border-left: 4px solid var(--primary);
}

.track-item-info {
    flex: 1;
    overflow: hidden;
}

.track-item-info h4 {
    font-size: 0.9rem;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
}

.btn-add {
    background: var(--accent);
    color: white;
    border: none;
    padding: 14px;
    border-radius: 12px;
    font-weight: bold;
    width: 100%;
    cursor: pointer;
}

#fileInput { display: none; }
</style>
</head>
<body>

<div id="splash">
    <div style="background: #111; padding: 30px; border-radius: 30px; border: 2px solid #ff4600; text-align: center;">
        <h1 style="color: #ff4600; font-size: 2rem; letter-spacing: 3px;">✦ IGNIS ✦</h1>
        <p style="color: #fff; font-size: 10px; margin-top: 5px;">VANDENSON LIMA PINHEIRO</p>
    </div>
</div>

<div class="main-container">
    <div class="player-card">
        <div id="disc" style="font-size: 50px; margin-bottom: 10px;">🎵</div>
        <div class="track-info">
            <h2 id="now-playing">Ben Music Pro</h2>
            <p id="now-artist">Escolha uma música</p>
        </div>

        <div class="progress-container" id="progress-root">
            <div class="progress-bar" id="progress-fill"></div>
        </div>
        <div style="display: flex; justify-content: space-between; font-size: 11px; color: var(--text-dim);">
            <span id="time-cur">0:00</span>
            <span id="time-total">0:00</span>
        </div>

        <div class="controls">
            <button class="btn-icon" onclick="app.prev()">⏮</button>
            <button class="btn-icon btn-play" id="play-btn" onclick="app.toggle()">▶</button>
            <button class="btn-icon" onclick="app.next()">⏭</button>
        </div>
    </div>

    <button class="btn-add" onclick="document.getElementById('fileInput').click()">
        ➕ ADICIONAR MÚSICAS DO CELULAR
    </button>
    <input type="file" id="fileInput" multiple accept="audio/*">

    <input type="text" class="search-box" id="search" placeholder="🔍 Pesquisar na lista...">

    <div class="playlist" id="playlist">
        <div style="padding: 40px; text-align: center; color: var(--text-dim);">
            Nenhuma música carregada.
        </div>
    </div>
</div>

<audio id="audio-player"></audio>

<script>
const app = {
    audio: document.getElementById('audio-player'),
    tracks: [],
    currentIndex: -1,
    isPlaying: false,

    init() {
        // Splash Screen delay
        setTimeout(() => {
            const s = document.getElementById('splash');
            s.style.opacity = '0';
            setTimeout(() => s.style.display = 'none', 500);
        }, 2500);

        // Listeners
        document.getElementById('fileInput').onchange = (e) => this.handleFiles(e.target.files);
        document.getElementById('search').oninput = (e) => this.render(e.target.value);
        
        this.audio.ontimeupdate = () => this.updateUI();
        this.audio.onended = () => this.next();

        // Barra de progresso clicável
        document.getElementById('progress-root').onclick = (e) => {
            const rect = e.currentTarget.getBoundingClientRect();
            const pos = (e.clientX - rect.left) / rect.width;
            this.audio.currentTime = pos * this.audio.duration;
        };
    },

    handleFiles(files) {
        if (files.length === 0) return;
        
        const newTracks = Array.from(files).map(file => ({
            name: file.name.replace(/\.[^/.]+$/, "").replace(/_/g, " "),
            data: file,
            url: URL.createObjectURL(file)
        }));

        this.tracks = [...this.tracks, ...newTracks].sort((a,b) => a.name.localeCompare(b.name));
        this.render();
    },

    render(filter = '') {
        const container = document.getElementById('playlist');
        container.innerHTML = '';

        const filtered = this.tracks.filter(t => t.name.toLowerCase().includes(filter.toLowerCase()));

        filtered.forEach((track, index) => {
            const div = document.createElement('div');
            div.className = `track-item ${this.currentIndex === index ? 'active' : ''}`;
            div.innerHTML = `
                <div style="font-size: 1.5rem;">${this.currentIndex === index && this.isPlaying ? '🔊' : '📁'}</div>
                <div class="track-item-info">
                    <h4>${track.name}</h4>
                    <p style="font-size: 11px; color: gray;">Áudio Local</p>
                </div>
            `;
            div.onclick = () => this.play(this.tracks.indexOf(track));
            container.appendChild(div);
        });
    },

    play(index) {
        if (index < 0 || index >= this.tracks.length) return;
        
        this.currentIndex = index;
        const track = this.tracks[index];
        
        this.audio.src = track.url;
        this.audio.play();
        this.isPlaying = true;
        
        document.getElementById('play-btn').innerText = '⏸';
        document.getElementById('now-playing').innerText = track.name;
        document.getElementById('now-artist').innerText = "Tocando agora";
        
        this.setupMediaSession(track);
        this.render();
    },

    toggle() {
        if (this.currentIndex === -1 && this.tracks.length > 0) return this.play(0);
        if (this.tracks.length === 0) return;

        if (this.audio.paused) {
            this.audio.play();
            this.isPlaying = true;
            document.getElementById('play-btn').innerText = '⏸';
        } else {
            this.audio.pause();
            this.isPlaying = false;
            document.getElementById('play-btn').innerText = '▶';
        }
    },

    next() {
        let next = this.currentIndex + 1;
        if (next >= this.tracks.length) next = 0;
        this.play(next);
    },

    prev() {
        let prev = this.currentIndex - 1;
        if (prev < 0) prev = this.tracks.length - 1;
        this.play(prev);
    },

    updateUI() {
        const cur = this.audio.currentTime;
        const dur = this.audio.duration;
        if (!dur) return;

        const percent = (cur / dur) * 100;
        document.getElementById('progress-fill').style.width = percent + '%';
        document.getElementById('time-cur').innerText = this.formatTime(cur);
        document.getElementById('time-total').innerText = this.formatTime(dur);
    },

    formatTime(sec) {
        const m = Math.floor(sec / 60);
        const s = Math.floor(sec % 60);
        return `${m}:${s < 10 ? '0' : ''}${s}`;
    },

    setupMediaSession(track) {
        if ('mediaSession' in navigator) {
            navigator.mediaSession.metadata = new MediaMetadata({
                title: track.name,
                artist: 'Ben Music Pro',
                album: 'Minha Biblioteca',
                artwork: [{ src: 'https://cdn-icons-png.flaticon.com/512/3844/3844724.png', sizes: '512x512', type: 'image/png' }]
            });

            navigator.mediaSession.setActionHandler('play', () => this.toggle());
            navigator.mediaSession.setActionHandler('pause', () => this.toggle());
            navigator.mediaSession.setActionHandler('previoustrack', () => this.prev());
            navigator.mediaSession.setActionHandler('nexttrack', () => this.next());
        }
    }
};

app.init();
</script>

</body>
</html>
